<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#17191B">
<title>MIDI Maker</title>
<script src="https://unpkg.com/soundfont-player@0.12.0/dist/soundfont-player.js"></script>
<script src="https://surikov.github.io/webaudiofont/npm/dist/WebAudioFontPlayer.js"></script>
<style>
:root {
  /* ダークモード/強制ダーク化でも色が変わらないよう固定 */
  color-scheme: dark;
  --cell-w: 24px;
  /* ── 0xSynth Color System 確定版 2026-07-18 ──
     ベース: ミクチャコール / ミクティール#39C5BB(公式)=操作 /
     DXグリーン#6CC5A1=計器表示 / 01ピンク#E12885=REC・破壊的操作 */
  --ox-bg:        #17191B;
  --ox-surface:   #22262A;
  --ox-surface-2: #2A3036;
  --ox-line:      #363E45;
  --ox-line-soft: #2E353B;
  --ox-text:      #EFEDE7;
  --ox-text-dim:  #97A1A9;
  --ox-text-faint:#5A646C;
  --ox-miku:      #39C5BB;
  --ox-miku-deep: #2A938C;
  --ox-dxgreen:   #6CC5A1;
  --ox-pink:      #E12885;
  --ox-on-accent: #10312E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: var(--ox-bg);
  color: var(--ox-text);
  height: 100vh;
  height: 100dvh; /* モバイルのアドレスバー分を除いた実表示領域 */
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Toolbar ── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  background: var(--ox-surface);
  padding: 10px 16px;
  border-bottom: 2px solid var(--ox-miku);
  flex-shrink: 0;
}

#toolbar h1 { font-size: 18px; color: var(--ox-miku); white-space: nowrap; }

.ctrl { display: flex; align-items: center; gap: 6px; }
.ctrl label { font-size: 12px; color: var(--ox-text-dim); white-space: nowrap; }

input[type="number"] {
  width: 60px; padding: 4px 6px;
  background: var(--ox-surface-2); border: 1px solid var(--ox-line);
  color: var(--ox-text); border-radius: 4px; font-size: 14px; text-align: center;
}
input[type="number"]:focus { outline: none; border-color: var(--ox-miku); }

select {
  padding: 4px 8px; background: var(--ox-surface-2);
  border: 1px solid var(--ox-line); color: var(--ox-text);
  border-radius: 4px; font-size: 13px; cursor: pointer;
}

button {
  padding: 7px 14px; border: none; border-radius: 5px;
  cursor: pointer; font-size: 13px; font-weight: bold;
  transition: opacity 0.15s;
}
button:hover { opacity: 0.8; }
button:active { opacity: 0.6; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

#btn-play   { background: var(--ox-miku); color: var(--ox-on-accent); }
#btn-stop   { background: var(--ox-surface-2); color: var(--ox-text); border: 1px solid var(--ox-line); }
#btn-clear  { background: var(--ox-pink); color: #fff; }
#btn-export { background: var(--ox-miku); color: var(--ox-on-accent); }

/* ── Resolution buttons ── */
.res-btn { background: var(--ox-surface-2); color: var(--ox-text-dim); }
.res-btn.active { background: var(--ox-miku); color: var(--ox-on-accent); }

/* ── Select mode ── */
#btn-select.active { background: var(--ox-text); color: var(--ox-bg); }
.cell.selected { outline: 2px solid var(--ox-text); outline-offset: -2px; background: rgba(239,237,231,0.22) !important; }
.cell.paste-preview { outline: 2px dashed var(--ox-miku-deep); outline-offset: -2px; background: rgba(57,197,187,0.15) !important; }

/* ── Toolbar advanced toggle ── */
#toolbar-advanced { display: contents; }
#toolbar-advanced.hidden > * { display: none; }
#btn-advanced {
  padding: 5px 10px; background: transparent;
  border: 1px solid var(--ox-line); border-radius: 4px;
  color: var(--ox-text-faint); font-size: 11px; cursor: pointer; font-weight: normal;
  white-space: nowrap;
}
#btn-advanced:hover { color: var(--ox-text-dim); border-color: var(--ox-text-faint); opacity: 1; }

/* ── Volume slider ── */
#volume { width: 70px; accent-color: var(--ox-miku); cursor: pointer; vertical-align: middle; }
#volume-pct { font-size: 11px; color: var(--ox-text-dim); width: 34px; text-align: right; }

/* ── SF loading status ── */
#sf-status {
  font-size: 11px; color: var(--ox-text-faint); white-space: nowrap;
}
#sf-status.loading { color: #e9a020; }
#sf-status.ready   { color: var(--ox-dxgreen); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
#sf-status.loading { animation: pulse 1s infinite; }

/* ── Beat / Bar header ── */
#roll-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
}

#left-col {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}

#corner { width: 56px; height: 44px; background: var(--ox-surface); flex-shrink: 0; }

#key-col {
  width: 56px;
  overflow: hidden;
  flex: 1;
}

#key-inner {
  /* height set by JS */
}

.key-row {
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 5px;
  font-size: 10px;
  border-bottom: 1px solid var(--ox-line-soft);
  user-select: none;
  cursor: pointer;
  transition: filter 0.05s;
}
.key-row:hover  { filter: brightness(1.4); }
.key-row:active { filter: brightness(1.8); }
.key-row.white { background: #39424b; color: #c3cad0; }
.key-row.black { background: #1a1e22; color: #7a838b; }
.key-row.c-label { color: var(--ox-dxgreen) !important; font-weight: bold; }

#right-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#header-scroll {
  overflow: hidden;
  flex-shrink: 0;
  height: 44px;
}

#chord-row {
  display: flex;
  height: 20px;
}

.chord-cell {
  flex-shrink: 0;
  height: 20px;
  display: flex;
  align-items: center;
  padding-left: 4px;
  font-size: 15px;
  font-weight: bold;
  color: var(--ox-text);
  overflow: hidden;
  white-space: nowrap;
  cursor: text;
  border-right: 1px solid var(--ox-line-soft);
  user-select: none;
  box-sizing: border-box;
}
.chord-cell:hover { background: rgba(57,197,187,0.08); }
.chord-cell input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--ox-miku);
  color: var(--ox-text);
  font-size: 15px;
  font-weight: bold;
  width: 100%;
  outline: none;
  padding: 0;
}

#header-row {
  display: flex;
  height: 24px;
  /* width set by JS */
}

.header-cell {
  width: var(--cell-w);
  height: 24px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--ox-text-dim);
  border-right: 1px solid var(--ox-line-soft);
  background: var(--ox-surface);
}
.header-cell.bar-label { color: var(--ox-dxgreen); font-weight: bold; background: var(--ox-surface-2); }
.header-cell.beat-label { color: var(--ox-text-dim); }

#grid-scroll {
  flex: 1;
  overflow: auto;
  position: relative;
}

#grid {
  display: grid;
  /* columns & rows set by JS */
}

.cell {
  width: var(--cell-w);
  height: 20px;
  border-right: 1px solid var(--ox-line-soft);
  border-bottom: 1px solid var(--ox-line-soft);
  cursor: crosshair;
  transition: background 0.05s;
}
.cell.white { background: #262c31; }
.cell.black { background: #1b1f23; }
.cell.bar-start  { border-left: 2px solid #4c575f; }
.cell.beat-start { border-left: 1px solid #3a424a; }
.cell.active  { background: var(--ox-miku) !important; }
.cell.playing { background: var(--ox-dxgreen) !important; }
.cell:hover   { filter: brightness(1.4); }

/* ── Home Screen ── */
#home-screen {
  position: fixed; inset: 0;
  background: var(--ox-bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; gap: 24px;
}
#home-screen h1 { font-size: 22px; color: var(--ox-miku); letter-spacing: 0.04em; }
#btn-generate {
  padding: 22px 52px; background: var(--ox-miku); color: var(--ox-on-accent);
  border: none; border-radius: 14px; font-size: 24px; font-weight: bold;
  cursor: pointer; box-shadow: 0 4px 32px rgba(57,197,187,0.45);
  transition: transform 0.12s, box-shadow 0.12s;
}
#btn-generate:hover  { transform: scale(1.04); box-shadow: 0 6px 40px rgba(57,197,187,0.6); opacity: 1; }
#btn-generate:active { transform: scale(0.97); opacity: 1; }
#home-tagline { font-size: 13px; color: var(--ox-text-faint); }

/* ── AI Card ── */
#ai-card {
  display: none; flex-shrink: 0;
  background: #1d2124; border-bottom: 1px solid var(--ox-line);
  padding: 10px 16px; gap: 10px;
  flex-direction: column;
}
.ai-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
#ai-chords { font-size: 14px; color: var(--ox-dxgreen); letter-spacing: 0.1em; }
#ai-bpm    { font-size: 12px; color: var(--ox-dxgreen); }
#direction-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
.btn-dir {
  padding: 5px 14px; background: transparent;
  border: 1px solid var(--ox-line); border-radius: 20px;
  color: var(--ox-text-dim); font-size: 12px; cursor: pointer; font-weight: normal;
  transition: border-color 0.15s, color 0.15s;
}
.btn-dir:hover  { border-color: var(--ox-miku); color: var(--ox-text); opacity: 1; }
.btn-dir:active { opacity: 0.7; }

/* ── Meta Modal ── */
#meta-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65); z-index: 200;
  align-items: center; justify-content: center;
}
#meta-modal.open { display: flex; }
#meta-box {
  background: var(--ox-surface); border: 1px solid var(--ox-miku);
  border-radius: 12px; padding: 24px;
  width: 400px; max-width: 92vw;
  display: flex; flex-direction: column; gap: 14px;
}
#meta-box h2 { color: var(--ox-miku); font-size: 16px; }
.meta-field { display: flex; flex-direction: column; gap: 4px; }
.meta-field label { font-size: 12px; color: var(--ox-text-dim); }
.meta-field input {
  padding: 7px 10px; background: var(--ox-surface-2);
  border: 1px solid var(--ox-line); color: var(--ox-text);
  border-radius: 4px; font-size: 14px;
  transition: border-color 0.15s;
}
.meta-field input:focus { outline: none; border-color: var(--ox-miku); }
.meta-field input::placeholder { color: var(--ox-text-faint); }
.meta-hint { font-size: 11px; color: var(--ox-text-faint); }
.meta-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
#btn-meta-cancel { background: var(--ox-surface-2); color: var(--ox-text-dim); }
#btn-meta-save   { background: var(--ox-miku); color: var(--ox-on-accent); }
.meta-field select {
  background: var(--ox-surface-2); border: 1px solid var(--ox-line);
  color: var(--ox-text); border-radius: 4px; padding: 5px 8px; font-size: 13px;
}
.meta-field select:focus { outline: none; border-color: var(--ox-miku); }

/* ── Mobile ── */
button, select, input[type="number"], input[type="range"] { touch-action: manipulation; }
/* スマホ・小型タブレット向け折りたたみUI。
   max-width 932px = 横向きiPhone Pro Maxまでの幅を含む（縦向きスマホは当然含む）。
   max-height 500px = さらに幅広の横向き端末も高さで捕捉。
   → ラップトップ/デスクトップ（幅1024px以上）は従来のフル表示。 */
@media (max-width: 932px), (max-height: 500px) {
  #toolbar { gap: 7px; padding: 7px 8px; }
  #toolbar h1 { display: none; } /* スマホでは操作スペースを優先 */
  button { padding: 8px 11px; font-size: 12px; }
  .ctrl { gap: 4px; }
  .ctrl label { font-size: 11px; }
  #volume { width: 60px; }
  #corner, #key-col { width: 44px; }
  .key-row { padding-right: 3px; }
  .chord-cell { font-size: 13px; }
  #ai-card { padding: 8px 10px; }
  #direction-btns { margin-left: 0; }
  #home-screen h1 { font-size: 19px; }
  #btn-generate { padding: 18px 36px; font-size: 20px; }

  /* ── 簡素な折りたたみツールバー ──
     デフォルト表示は 再生/停止/選択/クリア/音量/詳細 のみ。
     「詳細」タップで toolbar-advanced（BPM等）と .adv-extra（読込/保存/ズーム/解像度）を展開。 */
  #toolbar-advanced.hidden ~ .adv-extra { display: none; }

  /* 並び順を画像に合わせる（DOM順はデスクトップ用に保持したまま視覚的に並べ替え） */
  #btn-play     { order: 1; }
  #btn-stop     { order: 2; }
  #btn-select   { order: 3; }
  #btn-clear    { order: 4; }
  #vol-ctrl     { order: 5; }
  #btn-advanced { order: 6; }
  #toolbar-advanced > * { order: 7; } /* 展開時は簡素バーの後ろ（次の行）に回す */
  .adv-extra    { order: 8; }

  /* 折りたたみ時は AIカード（コード表示・BPM表示・方向性ボタン）も隠す。
     「詳細」展開時（body.adv-open）のみ表示。 */
  #ai-card { display: none !important; }
  body.adv-open #ai-card { display: flex !important; }
}
</style>
</head>
<body>

<!-- Home Screen Overlay -->
<div id="home-screen">
  <h1>🎵 MIDI Maker</h1>
  <p id="home-tagline">AIが最初の一歩を作ります</p>
</div>

<div id="toolbar">
  <h1>🎵 MIDI Maker</h1>

  <div id="toolbar-advanced" class="hidden">
    <div class="ctrl">
      <label>BPM</label>
      <input type="number" id="bpm" value="120" min="30" max="300">
    </div>

    <div class="ctrl">
      <label>音符の長さ</label>
      <select id="note-len">
        <option value="1">16分音符</option>
        <option value="2">8分音符</option>
        <option value="4" selected>4分音符</option>
        <option value="8">2分音符</option>
        <option value="16">全音符</option>
      </select>
    </div>

    <div class="ctrl">
      <label>小節数</label>
      <select id="num-bars">
        <option value="2">2小節</option>
        <option value="4" selected>4小節</option>
        <option value="8">8小節</option>
        <option value="16">16小節</option>
      </select>
    </div>

    <div class="ctrl">
      <label>拍子</label>
      <select id="timesig-num">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="9">9</option>
        <option value="12">12</option>
      </select>
      <span style="color:var(--ox-text-dim);font-size:13px">/</span>
      <select id="timesig-den">
        <option value="2">2</option>
        <option value="4" selected>4</option>
        <option value="8">8</option>
      </select>
    </div>

    <div class="ctrl">
      <label>楽器</label>
      <!-- options built by JS -->
      <select id="instrument"></select>
    </div>

    <span id="sf-status"></span>
  </div>

  <button id="btn-advanced">詳細 ▼</button>
  <button id="btn-play">▶ 再生</button>
  <button id="btn-stop">■ 停止</button>
  <div class="ctrl" id="vol-ctrl">
    <label>🔊</label>
    <input type="range" id="volume" min="0" max="3" step="0.05" value="2">
    <span id="volume-pct">100%</span>
  </div>
  <button id="btn-select">⬚ 選択</button>
  <button id="btn-clear">🗑 クリア</button>
  <button id="btn-import" class="adv-extra">📂 MIDI読み込み</button>
  <input type="file" id="import-file" accept=".mid,.midi,audio/midi,audio/x-midi" style="display:none">
  <button id="btn-export" class="adv-extra">💾 MIDIで保存</button>
  <div class="ctrl adv-extra">
    <button id="btn-zoom-out">－</button>
    <span id="zoom-label">100%</span>
    <button id="btn-zoom-in">＋</button>
  </div>
  <div class="ctrl adv-extra">
    <button class="res-btn" data-res="8">8分</button>
    <button class="res-btn active" data-res="16">16分</button>
    <button class="res-btn" data-res="32">32分</button>
  </div>
</div>

<!-- AI Card -->
<div id="ai-card">
  <div class="ai-row">
    <span id="ai-chords"></span>
    <span id="ai-bpm"></span>
    <div id="direction-btns">
      <button class="btn-dir" data-dir="bright">もっと明るく</button>
      <button class="btn-dir" data-dir="emo">もっとエモく</button>
      <button class="btn-dir" data-dir="quiet">もっと静か</button>
      <button class="btn-dir" data-dir="other">別案</button>
    </div>
  </div>
</div>

<div id="roll-wrap">
  <!-- Left column: corner + key labels -->
  <div id="left-col">
    <div id="corner"></div>
    <div id="key-col"><div id="key-inner"></div></div>
  </div>

  <!-- Right column: header + grid -->
  <div id="right-col">
    <div id="header-scroll"><div id="chord-row"></div><div id="header-row"></div></div>
    <div id="grid-scroll">
      <div id="grid"></div>
    </div>
  </div>
</div>

<!-- Meta Info Modal -->
<div id="meta-modal">
  <div id="meta-box">
    <h2>💾 MIDIとして保存</h2>
    <p class="meta-hint">メタ情報は任意です。空欄のままでも保存できます。</p>
    <div class="meta-field">
      <label>曲名 (Track Name)</label>
      <input type="text" id="meta-title" placeholder="例: My Song" maxlength="128">
    </div>
    <div class="meta-field">
      <label>テキスト / 作者名 (Text)</label>
      <input type="text" id="meta-text" placeholder="例: Composed by ..." maxlength="128">
    </div>
    <div class="meta-field">
      <label>著作権 (Copyright)</label>
      <input type="text" id="meta-copyright" placeholder="例: © 2026 Your Name" maxlength="128">
    </div>
    <div class="meta-field">
      <label>調 (Key Signature)</label>
      <select id="meta-key">
        <option value="">（指定なし）</option>
        <optgroup label="長調 (Major)">
          <option value="-7,0">Cb Major (7♭)</option>
          <option value="-6,0">Gb Major (6♭)</option>
          <option value="-5,0">Db Major (5♭)</option>
          <option value="-4,0">Ab Major (4♭)</option>
          <option value="-3,0">Eb Major (3♭)</option>
          <option value="-2,0">Bb Major (2♭)</option>
          <option value="-1,0">F Major (1♭)</option>
          <option value="0,0">C Major (♮)</option>
          <option value="1,0">G Major (1♯)</option>
          <option value="2,0">D Major (2♯)</option>
          <option value="3,0">A Major (3♯)</option>
          <option value="4,0">E Major (4♯)</option>
          <option value="5,0">B Major (5♯)</option>
          <option value="6,0">F# Major (6♯)</option>
          <option value="7,0">C# Major (7♯)</option>
        </optgroup>
        <optgroup label="短調 (Minor)">
          <option value="-7,1">Ab minor (7♭)</option>
          <option value="-6,1">Eb minor (6♭)</option>
          <option value="-5,1">Bb minor (5♭)</option>
          <option value="-4,1">F minor (4♭)</option>
          <option value="-3,1">C minor (3♭)</option>
          <option value="-2,1">G minor (2♭)</option>
          <option value="-1,1">D minor (1♭)</option>
          <option value="0,1">A minor (♮)</option>
          <option value="1,1">E minor (1♯)</option>
          <option value="2,1">B minor (2♯)</option>
          <option value="3,1">F# minor (3♯)</option>
          <option value="4,1">C# minor (4♯)</option>
          <option value="5,1">G# minor (5♯)</option>
          <option value="6,1">D# minor (6♯)</option>
          <option value="7,1">A# minor (7♯)</option>
        </optgroup>
      </select>
    </div>
    <div class="meta-btns">
      <button id="btn-meta-cancel">キャンセル</button>
      <button id="btn-meta-save">保存する</button>
    </div>
  </div>
</div>

<script>
// ── GM Instrument Data ──────────────────────────────────
const GM_GROUPS = [
  { name: 'ピアノ', instruments: [
    'Acoustic Grand Piano','Bright Acoustic Piano','Electric Grand Piano','Honky-tonk Piano',
    'Electric Piano 1','Electric Piano 2','Harpsichord','Clavinet'] },
  { name: '鍵盤打楽器', instruments: [
    'Celesta','Glockenspiel','Music Box','Vibraphone',
    'Marimba','Xylophone','Tubular Bells','Dulcimer'] },
  { name: 'オルガン', instruments: [
    'Drawbar Organ','Percussive Organ','Rock Organ','Church Organ',
    'Reed Organ','Accordion','Harmonica','Tango Accordion'] },
  { name: 'ギター', instruments: [

// ── Constants ──────────────────────────────────────────
const MIDI_LO   = 36;   // C2
const MIDI_HI   = 84;   // C6 (exclusive)
const NUM_NOTES = MIDI_HI - MIDI_LO;  // 48
let STEPS_PER_BAR  = 16; // recalculated on timesig change
let STEPS_PER_BEAT = 4;  // recalculated on timesig change

function updateTimeSig() {
  const tsNum = +document.getElementById('timesig-num').value;
  const tsDen = +document.getElementById('timesig-den').value;
  STEPS_PER_BEAT = Math.round(gridResolution / tsDen);
  STEPS_PER_BAR  = tsNum * STEPS_PER_BEAT;
}

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const IS_BLACK   = new Set([1,3,6,8,10]);

const midiToName  = m => NOTE_NAMES[m % 12] + (Math.floor(m / 12) - 1);
const isBlack     = m => IS_BLACK.has(m % 12);
const rowToMidi   = r => (MIDI_HI - 1) - r;
const midiNoteName = m => NOTE_NAMES[m % 12] + (Math.floor(m / 12) - 1);

// ── State ──────────────────────────────────────────────
let numBars  = 4;
let numSteps = numBars * STEPS_PER_BAR;
let grid_data = [];   // grid_data[row][col] boolean

function initData() {
  grid_data = Array.from({ length: NUM_NOTES }, () => new Array(numSteps).fill(false));
}
initData();

// ── Zoom ───────────────────────────────────────────────
const CELL_WIDTHS = [12, 16, 20, 24, 32, 40, 48, 64];
const CELL_W_DEFAULT = 24;
let cellWidthIdx = CELL_WIDTHS.indexOf(CELL_W_DEFAULT);

function setZoom(idx) {
  cellWidthIdx = Math.max(0, Math.min(CELL_WIDTHS.length - 1, idx));
  const w = CELL_WIDTHS[cellWidthIdx];
  document.documentElement.style.setProperty('--cell-w', w + 'px');
  const pct = Math.round(w / CELL_W_DEFAULT * 100);
  document.getElementById('zoom-label').textContent = pct + '%';
  document.getElementById('btn-zoom-out').disabled = cellWidthIdx === 0;
  document.getElementById('btn-zoom-in').disabled  = cellWidthIdx === CELL_WIDTHS.length - 1;
  const g = document.getElementById('grid');
  if (g.children.length) {
    g.style.gridTemplateColumns = `repeat(${numSteps}, ${w}px)`;
    g.style.width = numSteps * w + 'px';
    document.getElementById('header-row').style.width = numSteps * w + 'px';
    document.getElementById('chord-row').style.width  = numSteps * w + 'px';
    document.querySelectorAll('.chord-cell').forEach(cell => {
      cell.style.width = STEPS_PER_BAR * w + 'px';
    });
  }
}

document.getElementById('btn-zoom-in').addEventListener('click',  () => setZoom(cellWidthIdx + 1));
document.getElementById('btn-zoom-out').addEventListener('click', () => setZoom(cellWidthIdx - 1));

// ── Grid Resolution ────────────────────────────────────
let gridResolution = 16; // 8 / 16 / 32

function extractNoteRuns() {
  const runs = [];
  for (let r = 0; r < NUM_NOTES; r++) {
    let c = 0;
    while (c < numSteps) {
      if (grid_data[r][c]) {
        let len = 1;
        while (c + len < numSteps && grid_data[r][c + len]) len++;
        runs.push({ r, start: c, len });
        c += len;
      } else { c++; }
    }
  }
  return runs;
}

function setResolution(newRes) {
  const runs  = extractNoteRuns();
  const ratio = newRes / gridResolution;
  gridResolution = newRes;
  updateTimeSig();
  numSteps = numBars * STEPS_PER_BAR;
  initData();
  runs.forEach(({ r, start, len }) => {
    const ns = Math.round(start * ratio);
    const nl = Math.max(1, Math.round(len * ratio));
    for (let s = 0; s < nl; s++) {
      if (ns + s < numSteps) grid_data[r][ns + s] = true;
    }
  });
  stopPlayback();
  buildHeader();
  buildGrid();
  scrollToMiddleC();
  document.querySelectorAll('.res-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.res === newRes);
  });
}

document.querySelectorAll('.res-btn').forEach(btn => {
  btn.addEventListener('click', () => setResolution(+btn.dataset.res));
});

// ── Soundfont State ────────────────────────────────────
let audioCtx        = null;
let masterGainNode  = null;
let masterVolume    = 2.0;
let sfInstrument    = null;
let sfLoadedProg    = -1;
let sfLoading       = false;

// ── WebAudioFont Drum State ────────────────────────────
let wavPlayer       = null;
const drumSamples   = new Map(); // midiNote → decoded wav data

function ensureWavPlayer() {
  if (!wavPlayer && typeof WebAudioFontPlayer !== 'undefined') {
    wavPlayer = new WebAudioFontPlayer();
  }
  return wavPlayer;
}

function loadDrumNote(midiNote) {
  if (drumSamples.has(midiNote)) return Promise.resolve();
  const varName = `_drum_${midiNote}_0_JCLive_sf2_file`;
  return new Promise(resolve => {
    const doLoad = () => {
      const wp = ensureWavPlayer();
      if (!wp || !window[varName]) { resolve(); return; }
      wp.loader.decodeAfterLoading(audioCtx, varName);
      wp.loader.waitLoad(() => {
        drumSamples.set(midiNote, window[varName]);
        resolve();
      });
    };
    if (window[varName]) { doLoad(); return; }
    const script = document.createElement('script');
    script.src = `https://surikov.github.io/webaudiofontdata/sound/128${midiNote}_0_JCLive_sf2_file.js`;
    script.onload = doLoad;
    script.onerror = () => resolve();
    document.head.appendChild(script);
  });
}

async function loadPercussionSamples() {
  const active = new Set();
  for (let r = 0; r < NUM_NOTES; r++) {
    if (grid_data[r].some(v => v)) {
      const midi = rowToMidi(r);
      if (midi >= 35 && midi <= 81) active.add(midi);
    }
  }
  if (active.size === 0) return;
  await Promise.all([...active].map(note => loadDrumNote(note)));
}

function ensureMasterGain() {
  if (!masterGainNode) {
    masterGainNode = audioCtx.createGain();
    masterGainNode.gain.value = masterVolume;
    masterGainNode.connect(audioCtx.destination);
  }
  return masterGainNode;
}

function setSfStatus(state, text) {
  const el = document.getElementById('sf-status');
  el.className = state;
  el.textContent = text;
}

async function loadSfInstrument(program) {
  if (program === 128) {
    sfLoadedProg = 128;
    sfLoading = false;
    setSfStatus('ready', '♪ GM Percussion Map');
    return;
  }
  if (sfLoadedProg === program && sfInstrument) return;
  if (sfLoading) return;
  sfLoading = true;
  setSfStatus('loading', '音色を読み込み中...');
  try {
    const override  = GM_SF_OVERRIDES[program];
    const sfName    = override ? override.name : (GM_SF_NAMES[program] || 'acoustic_grand_piano');
    const soundfont = override ? override.soundfont : 'MusyngKite';
    sfInstrument = await Soundfont.instrument(audioCtx, sfName, { soundfont, destination: ensureMasterGain() });
    sfLoadedProg = program;
    const dispName = GM_SF_NAMES[program] || 'piano';
    setSfStatus('ready', '♪ ' + dispName.replace(/_/g, ' '));
  } catch(e) {
    console.warn('Soundfont load failed:', e);
    sfInstrument = null;
    setSfStatus('', '');
  }
  sfLoading = false;
}

function isPercussion() {
  return +document.getElementById('instrument').value === 128;
}

// ── Build Instrument Select ────────────────────────────
function buildInstrumentSelect() {
  const sel = document.getElementById('instrument');
  sel.innerHTML = '';
  let prog = 0;
  for (const group of GM_GROUPS) {
    const og = document.createElement('optgroup');
    og.label = group.name;
    for (const name of group.instruments) {
      const opt = document.createElement('option');
      opt.value = prog;
      opt.textContent = prog + ': ' + name;
      og.appendChild(opt);
      prog++;
    }
    sel.appendChild(og);
  }
  // GM Percussion Map (channel 10)
  const ogDrum = document.createElement('optgroup');
  ogDrum.label = 'ドラム';
  const optDrum = document.createElement('option');
  optDrum.value = 128;
  optDrum.textContent = '128: GM Percussion Map';
  ogDrum.appendChild(optDrum);
  sel.appendChild(ogDrum);
}

// ── Render ─────────────────────────────────────────────
function buildUI() {
  buildInstrumentSelect();
  buildKeys();
  buildHeader();
  buildGrid();
  scrollToMiddleC();
}

async function previewNote(midi) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  const program = +document.getElementById('instrument').value;
  if (program === 128) {
    if (!drumSamples.has(midi)) await loadDrumNote(midi);
    const data = drumSamples.get(midi);
    const wp = ensureWavPlayer();
    if (data && wp) wp.queueWaveTable(audioCtx, ensureMasterGain(), data, audioCtx.currentTime, midi, 0.8);
  } else {
    if (!sfInstrument && !sfLoading) await loadSfInstrument(program);
    if (sfInstrument) sfInstrument.play(midiNoteName(midi), audioCtx.currentTime, { duration: 1.0, gain: 1.0 });
  }
}

function buildKeys() {
  const inner = document.getElementById('key-inner');
  inner.innerHTML = '';
  inner.style.height = NUM_NOTES * 20 + 'px';
  const perc = isPercussion();
  for (let r = 0; r < NUM_NOTES; r++) {
    const midi = rowToMidi(r);
    const div  = document.createElement('div');
    if (perc) {
      div.className = 'key-row white';
      const dname = GM_DRUM_NAMES[midi];
      div.textContent = dname || '';
      div.style.fontSize = '9px';
      div.style.color = dname ? 'var(--ox-text)' : 'var(--ox-text-faint)';
      div.style.textAlign = 'left';
      div.style.paddingLeft = '4px';
      div.style.overflow = 'hidden';
      div.style.whiteSpace = 'nowrap';
    } else {
      div.className = 'key-row ' + (isBlack(midi) ? 'black' : 'white');
      if (midi % 12 === 0) {
        div.classList.add('c-label');
        div.textContent = midiToName(midi);
      } else if (!isBlack(midi)) {
        div.textContent = NOTE_NAMES[midi % 12];
      } else {
        div.textContent = '♯';
      }
    }
    div.addEventListener('mousedown', e => { e.preventDefault(); previewNote(midi); });
    inner.appendChild(div);
  }
}

// ── Chord Labels ───────────────────────────────────────
let barChords = Array(16).fill(''); // インデックス=小節番号

function buildChordRow() {
  const row = document.getElementById('chord-row');
  row.innerHTML = '';
  const cw = CELL_WIDTHS[cellWidthIdx];
  row.style.width = numSteps * cw + 'px';
  for (let bar = 0; bar < numBars; bar++) {
    const cell = document.createElement('div');
    cell.className = 'chord-cell';
    cell.style.width = STEPS_PER_BAR * cw + 'px';
    cell.textContent = barChords[bar] || '';
    cell.dataset.bar = bar;
    cell.addEventListener('dblclick', startChordEdit);
    row.appendChild(cell);
  }
  updateChordDisplay();
}

// Mirror the bar-chords (shown above each bar) into the AI card's progression display
function updateChordDisplay() {
  const el = document.getElementById('ai-chords');
  if (!el) return;
  const chords = [];
  for (let bar = 0; bar < numBars; bar++) chords.push(barChords[bar] || '—');
  el.textContent = chords.join(' → ');
}

function startChordEdit(e) {
  const cell = e.currentTarget;
  const bar = +cell.dataset.bar;
  const prev = barChords[bar] || '';
  const input = document.createElement('input');
  input.type = 'text';
  input.value = prev;
  input.maxLength = 16;
  cell.textContent = '';
  cell.appendChild(input);
  input.focus();
  input.select();
  const finish = (cancel) => {
    barChords[bar] = cancel ? prev : input.value.trim();
    cell.textContent = barChords[bar];
    updateChordDisplay();
  };
  input.addEventListener('blur', () => finish(false));
  input.addEventListener('keydown', ev => {
    if (ev.key === 'Enter')  { ev.preventDefault(); input.blur(); }
    if (ev.key === 'Escape') { finish(true); }
  });
}

function buildHeader() {
  buildChordRow();
  const row = document.getElementById('header-row');
  row.innerHTML = '';
  row.style.width = numSteps * CELL_WIDTHS[cellWidthIdx] + 'px';
  for (let c = 0; c < numSteps; c++) {
    const div = document.createElement('div');
    div.className = 'header-cell';
    if (c % STEPS_PER_BAR === 0) {
      div.classList.add('bar-label');
      div.textContent = 'bar ' + (c / STEPS_PER_BAR + 1);
    } else if (c % STEPS_PER_BEAT === 0) {
      div.classList.add('beat-label');
      div.textContent = (c % STEPS_PER_BAR) / STEPS_PER_BEAT + 1;
    }
    row.appendChild(div);
  }
}

function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  const cw = CELL_WIDTHS[cellWidthIdx];
  g.style.gridTemplateColumns = `repeat(${numSteps}, ${cw}px)`;
  g.style.gridTemplateRows    = `repeat(${NUM_NOTES}, 20px)`;
  g.style.width  = numSteps * cw + 'px';
  g.style.height = NUM_NOTES * 20 + 'px';

  for (let r = 0; r < NUM_NOTES; r++) {
    const midi = rowToMidi(r);
    for (let c = 0; c < numSteps; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + (isBlack(midi) ? 'black' : 'white');
      if (c % STEPS_PER_BAR === 0)        cell.classList.add('bar-start');
      else if (c % STEPS_PER_BEAT === 0)  cell.classList.add('beat-start');
      if (grid_data[r][c])           cell.classList.add('active');
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('mousedown', onDown);
      cell.addEventListener('mouseenter', onEnter);
      g.appendChild(cell);
    }
  }
}

function scrollToMiddleC() {
  const c4row = (MIDI_HI - 1) - 60;
  const scrollTarget = c4row * 20 - 100;
  document.getElementById('grid-scroll').scrollTop = Math.max(0, scrollTarget);
}

// ── Sync key-col scroll with grid-scroll ───────────────
document.getElementById('grid-scroll').addEventListener('scroll', function() {
  document.getElementById('key-col').scrollTop = this.scrollTop;
  document.getElementById('header-scroll').scrollLeft = this.scrollLeft;
});

// ── Select / Copy / Paste / Move ──────────────────────────────
let selectMode = false;
let sel = null;       // { r0,c0,r1,c1 } raw (未正規化)
let clipboard = null; // { cells:[{dr,dc}] }
let pasteMode = false;
let hoverR = 0, hoverC = 0;       // 直近のマウス位置
let moveState = null; // { notes:[{r,c}], grabR, grabC, dR:0, dC:0 }

const getNorm = () => sel ? {
  r0: Math.min(sel.r0, sel.r1), r1: Math.max(sel.r0, sel.r1),
  c0: Math.min(sel.c0, sel.c1), c1: Math.max(sel.c0, sel.c1),
} : null;

const inSel = (r, c) => { const n = getNorm(); return n && r >= n.r0 && r <= n.r1 && c >= n.c0 && c <= n.c1; };

function redrawSel() {
  document.querySelectorAll('.cell.selected').forEach(el => el.classList.remove('selected'));
  const n = getNorm(); if (!n) return;
  for (let r = n.r0; r <= n.r1; r++)
    for (let c = n.c0; c <= n.c1; c++)
      cellEl(r, c)?.classList.add('selected');
}

function clearPreview() {
  document.querySelectorAll('.cell.paste-preview').forEach(el => el.classList.remove('paste-preview'));
}

function redrawPreview(cells, pivotR, pivotC) {
  clearPreview();
  cells.forEach(({ dr, dc }) => {
    const r = pivotR + dr, c = pivotC + dc;
    if (r >= 0 && r < NUM_NOTES && c >= 0 && c < numSteps)
      cellEl(r, c)?.classList.add('paste-preview');
  });
}

function enterSelectMode(on) {
  selectMode = on;
  document.getElementById('btn-select').classList.toggle('active', on);
  if (!on) {
    sel = null; redrawSel();
    pasteMode = false; clearPreview();
    if (moveState) cancelMove();
  }
}

function cancelMove() {
  if (!moveState) return;
  // ノートを元の位置に戻す
  moveState.notes.forEach(({ r, c }) => {
    grid_data[r][c] = true;
    cellEl(r, c)?.classList.add('active');
  });
  clearPreview();
  moveState = null;
}

document.getElementById('btn-select').addEventListener('click', () => enterSelectMode(!selectMode));

// ── キーボード ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (moveState) { cancelMove(); return; }
    if (pasteMode) { pasteMode = false; clearPreview(); return; }
    enterSelectMode(false);
    return;
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectMode) {
    const n = getNorm(); if (!n) return;
    for (let r = n.r0; r <= n.r1; r++)
      for (let c = n.c0; c <= n.c1; c++) {
        grid_data[r][c] = false;
        cellEl(r, c)?.classList.remove('active');
      }
    e.preventDefault();
    return;
  }
  if (e.ctrlKey && e.key === 'c') {
    const n = getNorm(); if (!n) return;
    const cells = [];
    for (let r = n.r0; r <= n.r1; r++)
      for (let c = n.c0; c <= n.c1; c++)
        if (grid_data[r][c]) cells.push({ dr: r - n.r0, dc: c - n.c0 });
    clipboard = { cells };
    pasteMode = true;
    redrawPreview(cells, hoverR, hoverC);
    e.preventDefault();
  }
  if (e.ctrlKey && e.key === 'v') {
    if (!clipboard) return;
    if (!pasteMode) pasteMode = true;
    commitPaste(hoverR, hoverC);
    e.preventDefault();
  }
});

function commitPaste(pivotR, pivotC) {
  clipboard.cells.forEach(({ dr, dc }) => {
    const r = pivotR + dr, c = pivotC + dc;
    if (r >= 0 && r < NUM_NOTES && c >= 0 && c < numSteps) {
      grid_data[r][c] = true;
      cellEl(r, c)?.classList.add('active');
    }
  });
  clearPreview();
  pasteMode = false;
}

// ── Mouse interaction ──────────────────────────────────
let mouseDown = false;
let dragMode  = null; // 'add' | 'remove' | 'select' | 'move'

document.addEventListener('mousedown', () => mouseDown = true);
document.addEventListener('mouseup', () => {
  mouseDown = false;
  if (dragMode === 'move' && moveState) {
    // 移動確定
    const { dR, dC, notes } = moveState;
    clearPreview();
    notes.forEach(({ r, c }) => {
      const nr = r + dR, nc = c + dC;
      if (nr >= 0 && nr < NUM_NOTES && nc >= 0 && nc < numSteps) {
        grid_data[nr][nc] = true;
        cellEl(nr, nc)?.classList.add('active');
      }
    });
    // 選択範囲を移動後の位置に更新
    if (sel) sel = { r0: sel.r0 + dR, c0: sel.c0 + dC, r1: sel.r1 + dR, c1: sel.c1 + dC };
    redrawSel();
    moveState = null;
  }
  dragMode = null;
});

function onDown(e) {
  e.preventDefault();
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;

  // ペーストモード中はクリックで貼り付け
  if (pasteMode && clipboard) {
    commitPaste(r, c);
    return;
  }

  if (selectMode) {
    if (inSel(r, c) && sel) {
      // 選択範囲内 → 移動開始
      const n = getNorm();
      const notes = [];
      for (let nr = n.r0; nr <= n.r1; nr++)
        for (let nc = n.c0; nc <= n.c1; nc++)
          if (grid_data[nr][nc]) notes.push({ r: nr, c: nc });
      notes.forEach(({ r: nr, c: nc }) => {
        grid_data[nr][nc] = false;
        cellEl(nr, nc)?.classList.remove('active');
      });
      moveState = { notes, grabR: r, grabC: c, dR: 0, dC: 0, selR0: n.r0, selC0: n.c0 };
      dragMode = 'move';
      redrawPreview(notes.map(({ r: nr, c: nc }) => ({ dr: nr - n.r0, dc: nc - n.c0 })), n.r0, n.c0);
    } else {
      // 新規選択
      sel = { r0: r, c0: c, r1: r, c1: c };
      redrawSel();
      dragMode = 'select';
    }
    return;
  }

  if (grid_data[r][c]) {
    dragMode = 'remove';
    removeNote(r, c);
  } else {
    dragMode = 'add';
    addNote(r, c);
  }
}

function onEnter(e) {
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;
  hoverR = r; hoverC = c;

  // ペーストプレビュー（ドラッグ中でなくても追従）
  if (pasteMode && clipboard && !mouseDown) {
    redrawPreview(clipboard.cells, r, c);
    return;
  }

  if (!mouseDown || !dragMode) return;

  if (dragMode === 'select') {
    sel.r1 = r; sel.c1 = c;
    redrawSel();
    return;
  }
  if (dragMode === 'move' && moveState) {
    const dR = r - moveState.grabR;
    const dC = c - moveState.grabC;
    moveState.dR = dR; moveState.dC = dC;
    const { selR0, selC0, notes } = moveState;
    redrawPreview(
      notes.map(({ r: nr, c: nc }) => ({ dr: nr - selR0, dc: nc - selC0 })),
      selR0 + dR, selC0 + dC
    );
    return;
  }
  if (dragMode === 'add')    addNote(r, c);
  if (dragMode === 'remove') removeNote(r, c);
}

function addNote(r, c) {
  const len = +document.getElementById('note-len').value;
  for (let i = 0; i < len && c + i < numSteps; i++) {
    grid_data[r][c + i] = true;
    cellEl(r, c + i)?.classList.add('active');
  }
}

function removeNote(r, c) {
  grid_data[r][c] = false;
  cellEl(r, c)?.classList.remove('active');
}

function cellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

// ── Bar count change ───────────────────────────────────
document.getElementById('num-bars').addEventListener('change', function() {
  const newBars  = +this.value;
  const newSteps = newBars * STEPS_PER_BAR;
  for (let r = 0; r < NUM_NOTES; r++) {
    if (newSteps > numSteps) {
      for (let c = numSteps; c < newSteps; c++) grid_data[r].push(false);
    } else {
      grid_data[r].length = newSteps;
    }
  }
  // barChords を拡縮
  while (barChords.length < newBars) barChords.push('');
  barChords.length = newBars;
  numBars  = newBars;
  numSteps = newSteps;
  buildHeader();
  buildGrid();
});

// ── Time signature change ──────────────────────────────
function onTimeSigChange() {
  updateTimeSig();
  const newSteps = numBars * STEPS_PER_BAR;
  for (let r = 0; r < NUM_NOTES; r++) {
    if (newSteps > numSteps) {
      for (let c = numSteps; c < newSteps; c++) grid_data[r].push(false);
    } else {
      grid_data[r].length = newSteps;
    }
  }
  numSteps = newSteps;
  buildHeader();
  buildGrid();
}
document.getElementById('timesig-num').addEventListener('change', onTimeSigChange);
document.getElementById('timesig-den').addEventListener('change', onTimeSigChange);

// ── Volume slider ─────────────────────────────────────
document.getElementById('volume').addEventListener('input', function() {
  masterVolume = parseFloat(this.value);
  if (masterGainNode) masterGainNode.gain.value = masterVolume;
  document.getElementById('volume-pct').textContent = Math.round(masterVolume * 50) + '%';

// ── Instrument change → reload soundfont ───────────────
document.getElementById('instrument').addEventListener('change', function() {

  setSfStatus('', '');
  buildKeys();
  if (audioCtx) {
    loadSfInstrument(+this.value);
  }
});

// ── Playback ───────────────────────────────────────────
let playing    = false;
let paused     = false;
let playTimer  = null;
let curStep    = 0;
let nextTime   = 0;
let lastHighCol = -1;

function stepDuration() {
  return 60 / (+document.getElementById('bpm').value) * 4 / gridResolution;
}

function midiToFreq(m) { return 440 * 2 ** ((m - 69) / 12); }

function scheduleNote(midi, when, dur) {
  if (isPercussion()) {
    const data = drumSamples.get(midi);
    const wp = ensureWavPlayer();
    if (data && wp) {
      wp.queueWaveTable(audioCtx, ensureMasterGain(), data, when, midi, Math.min(dur, 0.8));
    }
    return;
  }
  if (sfInstrument) {
    sfInstrument.play(midiNoteName(midi), when, { duration: dur * 0.85, gain: 1.0 });
  } else {
    // Fallback oscillator
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'triangle';
    osc.frequency.value = midiToFreq(midi);
    gain.gain.setValueAtTime(0.25, when);
    gain.gain.exponentialRampToValueAtTime(0.0001, when + dur * 0.85);
    osc.start(when);
    osc.stop(when + dur);
  }
}

function scheduleLoop() {
  const dur = stepDuration();
  while (nextTime < audioCtx.currentTime + 0.15) {
    const step = curStep;
    const delay = (nextTime - audioCtx.currentTime) * 1000;
    setTimeout(() => highlightCol(step), Math.max(0, delay));

    for (let r = 0; r < NUM_NOTES; r++) {
      if (grid_data[r][step]) {
        if (isPercussion()) {
          // Each cell = one drum hit
          scheduleNote(rowToMidi(r), nextTime, dur * 0.9);
        } else {
          // Only trigger at the start of a run
          const isStart = step === 0 || !grid_data[r][step - 1];
          if (isStart) {
            let len = 1;
            while (step + len < numSteps && grid_data[r][step + len]) len++;
            scheduleNote(rowToMidi(r), nextTime, dur * len * 0.9);
          }
        }
      }
    }
    nextTime += dur;
    curStep = (curStep + 1) % numSteps;
  }
}

function highlightCol(col) {
  if (lastHighCol >= 0) {
    for (let r = 0; r < NUM_NOTES; r++) {
      cellEl(r, lastHighCol)?.classList.remove('playing');
    }
  }
  for (let r = 0; r < NUM_NOTES; r++) {
    cellEl(r, col)?.classList.add('playing');
  }
  lastHighCol = col;
}

function clearPlayHighlight() {
  if (lastHighCol >= 0) {
    for (let r = 0; r < NUM_NOTES; r++) {
      cellEl(r, lastHighCol)?.classList.remove('playing');
    }
    lastHighCol = -1;
  }
}

document.getElementById('btn-play').addEventListener('click', async () => {
  const btn = document.getElementById('btn-play');

  // 再生中 → 一時停止
  if (playing) {
    playing = false;
    paused  = true;
    clearInterval(playTimer);
    if (sfInstrument) sfInstrument.stop();
    curStep = lastHighCol >= 0 ? lastHighCol : curStep;
    btn.textContent = '▶ 再生';
    return;
  }

  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  // 一時停止中 → 再開（楽器ロード不要）
  if (paused) {
    paused   = false;
    playing  = true;
    nextTime = audioCtx.currentTime + 0.05;
    scheduleLoop();
    playTimer = setInterval(scheduleLoop, 50);
    btn.textContent = '⏸ 一時停止';
    return;
  }

  // 停止状態 → 最初から再生
  const program = +document.getElementById('instrument').value;
  if (program === 128) {
    btn.textContent = '読み込み中...';
    btn.disabled = true;
    await loadPercussionSamples();
    btn.disabled = false;
  } else if (!sfInstrument && !sfLoading) {
    btn.textContent = '読み込み中...';
    btn.disabled = true;
    await loadSfInstrument(program);
    btn.disabled = false;
  }

  playing  = true;
  paused   = false;
  curStep  = 0;
  nextTime = audioCtx.currentTime + 0.05;
  scheduleLoop();
  playTimer = setInterval(scheduleLoop, 50);
  btn.textContent = '⏸ 一時停止';
});

function stopPlayback() {
  playing = false;
  paused  = false;
  curStep = 0;
  clearInterval(playTimer);
  clearPlayHighlight();
  if (sfInstrument) sfInstrument.stop();
  document.getElementById('btn-play').textContent = '▶ 再生';
}

document.getElementById('btn-stop').addEventListener('click', stopPlayback);

document.getElementById('btn-clear').addEventListener('click', () => {
  stopPlayback();
  initData();
  buildGrid();
});

// ── MIDI Export ────────────────────────────────────────
function varLen(v) {
  const b = [v & 0x7F]; v >>= 7;
  while (v) { b.push((v & 0x7F) | 0x80); v >>= 7; }
  return b.reverse();
}
const u32 = v => [(v>>24)&0xFF,(v>>16)&0xFF,(v>>8)&0xFF,v&0xFF];
const u16 = v => [(v>>8)&0xFF,v&0xFF];

function writeMetaText(type, text) {
  if (!text || !text.trim()) return [];
  const bytes = Array.from(new TextEncoder().encode(text.trim()));
  return [0x00, 0xFF, type, ...varLen(bytes.length), ...bytes];
}

function getInstrumentName(program) {
  let idx = 0;
  for (const group of GM_GROUPS) {
    for (const name of group.instruments) {
      if (idx === program) return name;
      idx++;
    }
  }
  return null;
}

function doExport(title, textNote, copyright, keySig) {
  const bpm        = +document.getElementById('bpm').value;
  const instrument = +document.getElementById('instrument').value;
  const perc       = instrument === 128;
  const ch         = perc ? 9 : 0;
  const tsNum      = +document.getElementById('timesig-num').value;
  const tsDen      = +document.getElementById('timesig-den').value;
  const TPB        = 480;
  const TPS        = TPB * 4 / gridResolution;

  const evs = [];
  for (let r = 0; r < NUM_NOTES; r++) {
    const midi = rowToMidi(r);
    if (perc) {
      // Each cell is a separate drum hit
      for (let c = 0; c < numSteps; c++) {
        if (grid_data[r][c]) {
          evs.push({ tick: c * TPS,       type: 0x90 | ch, note: midi, vel: 100 });
          evs.push({ tick: c * TPS + TPS, type: 0x80 | ch, note: midi, vel: 0   });
        }
      }
    } else {
      let start = -1;
      for (let c = 0; c <= numSteps; c++) {
        const on = c < numSteps && grid_data[r][c];
        if (on  && start < 0) start = c;
        if (!on && start >= 0) {
          evs.push({ tick: start * TPS, type: 0x90 | ch, note: midi, vel: 100 });
          evs.push({ tick: c     * TPS, type: 0x80 | ch, note: midi, vel: 0   });
          start = -1;
        }
      }
    }
  }

  if (!evs.length) { alert('ノートが入力されていません'); return; }

  evs.sort((a, b) => a.tick - b.tick || (a.type === 0x80 ? -1 : 1));

  const track = [];
  const tempo = Math.round(60_000_000 / bpm);

  // Meta events (all at tick 0)
  track.push(0x00, 0xFF, 0x51, 0x03, (tempo>>16)&0xFF, (tempo>>8)&0xFF, tempo&0xFF);
  track.push(0x00, 0xFF, 0x58, 0x04, tsNum, Math.log2(tsDen), 24, 8);
  if (keySig) {
    const [k, s] = keySig.split(',').map(Number);
    track.push(0x00, 0xFF, 0x59, 0x02, k & 0xFF, s);
  }
  track.push(...writeMetaText(0x03, title));
  track.push(...writeMetaText(0x01, textNote));
  track.push(...writeMetaText(0x02, copyright));
  const instrName = perc ? 'GM Percussion Map' : getInstrumentName(instrument);
  if (instrName) track.push(...writeMetaText(0x04, instrName));

  // Program change (skip for percussion channel)
  if (!perc) track.push(0x00, 0xC0, instrument);

  // Note events
  let cur = 0;
  for (const ev of evs) {
    track.push(...varLen(ev.tick - cur), ev.type, ev.note, ev.vel);
    cur = ev.tick;
  }
  track.push(0x00, 0xFF, 0x2F, 0x00);

  const bytes = new Uint8Array([
    0x4D,0x54,0x68,0x64, ...u32(6), ...u16(0), ...u16(1), ...u16(TPB),
    0x4D,0x54,0x72,0x6B, ...u32(track.length), ...track,
  ]);

  const safeTitle = (title && title.trim()) ? title.trim().replace(/[\\/:*?"<>|]/g, '_') : 'composition';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([bytes], { type: 'audio/midi' }));
  a.download = safeTitle + '.mid';
  a.click();
}

// ── SMF Import ─────────────────────────────────────────
function readVarLen(d, p) {
  let v = 0, b;
  do { b = d[p.i++]; v = (v << 7) | (b & 0x7F); } while (b & 0x80);
  return v;
}

function parseSMF(data) {
  if (!(data[0]===0x4D && data[1]===0x54 && data[2]===0x68 && data[3]===0x64))
    throw new Error('MIDIファイルではありません（MThdが見つかりません）');
  const division = (data[12] << 8) | data[13];
  if (division & 0x8000) throw new Error('SMPTEタイムコード形式は未対応です');
  const ntrks = (data[10] << 8) | data[11];

  const noteEvents = [];   // { tick, on, ch, note, vel }
  const programs   = [];   // { tick, ch, program }
  let tempo = 500000;      // default = 120BPM
  let tsNum = 4, tsDenPow = 2, tsSet = false;

  let pos = 14;
  for (let t = 0; t < ntrks && pos + 8 <= data.length; t++) {
    const len = (data[pos+4]<<24)|(data[pos+5]<<16)|(data[pos+6]<<8)|data[pos+7];
    if (!(data[pos]===0x4D && data[pos+1]===0x54 && data[pos+2]===0x72 && data[pos+3]===0x6B)) {
      pos += 8 + len; continue;   // not an MTrk chunk — skip
    }
    const end = pos + 8 + len;
    const p = { i: pos + 8 };
    let tick = 0, running = 0;
    while (p.i < end) {
      tick += readVarLen(data, p);
      let status = data[p.i];
      if (status & 0x80) { p.i++; if (status < 0xF0) running = status; }
      else status = running;
      const type = status & 0xF0;
      const ch   = status & 0x0F;
      if (status === 0xFF) {                       // meta
        const mtype = data[p.i++], mlen = readVarLen(data, p);
        if (mtype === 0x51 && mlen === 3) {
          tempo = (data[p.i]<<16)|(data[p.i+1]<<8)|data[p.i+2];
        } else if (mtype === 0x58 && mlen >= 2 && !tsSet) {
          tsNum = data[p.i]; tsDenPow = data[p.i+1]; tsSet = true;
        }
        p.i += mlen;
      } else if (status === 0xF0 || status === 0xF7) {  // sysex
        p.i += readVarLen(data, p);
      } else if (type === 0x90) {                  // note on
        const note = data[p.i++], vel = data[p.i++];
        noteEvents.push({ tick, on: vel > 0, ch, note, vel });
      } else if (type === 0x80) {                  // note off
        const note = data[p.i++]; p.i++;
        noteEvents.push({ tick, on: false, ch, note, vel: 0 });
      } else if (type === 0xC0) {                  // program change
        programs.push({ tick, ch, program: data[p.i++] });
      } else if (type === 0xD0) {                  // channel pressure (1 byte)
        p.i++;
      } else if (type === 0xA0 || type === 0xB0 || type === 0xE0) {  // 2 bytes
        p.i += 2;
      } else {
        p.i++;                                     // unknown — advance to avoid a stall
      }
    }
    pos = end;
  }
  return { division, tempo, tsNum, tsDenPow, noteEvents, programs };
}

function pairNotes(noteEvents) {
  // off before on when they share a tick, so re-struck notes pair correctly
  noteEvents.sort((a, b) => a.tick - b.tick || (a.on ? 1 : -1));
  const active = new Map();   // ch*128+note -> [startTick, ...]
  const notes = [];
  for (const e of noteEvents) {
    const key = e.ch * 128 + e.note;
    if (e.on) {
      if (!active.has(key)) active.set(key, []);
      active.get(key).push(e.tick);
    } else {
      const st = active.get(key);
      if (st && st.length) {
        const start = st.shift();
        if (e.tick > start) notes.push({ midi: e.note, ch: e.ch, start, end: e.tick });
      }
    }
  }
  return notes;
}

function applyImport(parsed, fileName) {
  const notes = pairNotes(parsed.noteEvents);
  if (!notes.length) { alert('読み込めるノートがありませんでした'); return; }

  const melodic = notes.filter(n => n.ch !== 9);
  const drums   = notes.filter(n => n.ch === 9);
  const usePerc = melodic.length === 0;         // drums-only file → percussion mode
  const useNotes = usePerc ? drums : melodic;
  const droppedDrums = usePerc ? 0 : drums.length;

  // BPM
  const bpm = Math.min(300, Math.max(30, Math.round(60000000 / parsed.tempo)));
  document.getElementById('bpm').value = bpm;

  // Time signature (snap to the values the UI offers)
  const numOpts = [2,3,4,5,6,7,9,12], denOpts = [2,4,8];
  const tsNum = numOpts.includes(parsed.tsNum) ? parsed.tsNum : 4;
  let   tsDen = Math.pow(2, parsed.tsDenPow);
  if (!denOpts.includes(tsDen)) tsDen = 4;
  document.getElementById('timesig-num').value = tsNum;
  document.getElementById('timesig-den').value = tsDen;

  // Instrument
  let program = 0;
  if (usePerc) program = 128;
  else { const pc = parsed.programs.find(p => p.ch !== 9); if (pc) program = pc.program; }
  document.getElementById('instrument').value = program;

  // Pick the grid resolution that snaps with least error (prefer coarser)
  const tpq = parsed.division;
  let bestRes = 16, bestErr = Infinity;
  for (const res of [16, 32, 8]) {
    const st = tpq * 4 / res;
    let err = 0;
    for (const n of useNotes)
      err += Math.abs(n.start/st - Math.round(n.start/st)) + Math.abs(n.end/st - Math.round(n.end/st));
    err /= (useNotes.length * 2);
    if (err < bestErr - 0.01) { bestErr = err; bestRes = res; }
  }
  gridResolution = bestRes;
  document.querySelectorAll('.res-btn').forEach(b => b.classList.toggle('active', +b.dataset.res === bestRes));

  updateTimeSig();                              // recompute STEPS_PER_BAR/BEAT
  const stepTicks = tpq * 4 / gridResolution;

  // Bars needed to hold the content
  let maxEndStep = 0;
  for (const n of useNotes) maxEndStep = Math.max(maxEndStep, Math.round(n.end / stepTicks));
  const MAX_BARS = 64;
  let bars = Math.max(1, Math.ceil(maxEndStep / STEPS_PER_BAR));
  const truncated = bars > MAX_BARS;
  if (truncated) bars = MAX_BARS;

  numBars  = bars;
  numSteps = numBars * STEPS_PER_BAR;

  const barSel = document.getElementById('num-bars');
  if (!Array.from(barSel.options).some(o => +o.value === bars)) {
    const opt = document.createElement('option');
    opt.value = bars; opt.textContent = bars + '小節';
    barSel.appendChild(opt);
  }
  barSel.value = bars;

  barChords = Array(numBars).fill('');
  initData();

  // Write notes into the grid (fold out-of-range pitches by octave)
  let folded = 0, clipped = 0;
  for (const n of useNotes) {
    let midi = n.midi;
    while (midi < MIDI_LO)  { midi += 12; folded++; }
    while (midi >= MIDI_HI) { midi -= 12; folded++; }
    const row = (MIDI_HI - 1) - midi;
    let s = Math.round(n.start / stepTicks);
    let e = Math.round(n.end   / stepTicks);
    if (e <= s) e = s + 1;
    if (s >= numSteps) { clipped++; continue; }
    if (e > numSteps) e = numSteps;
    for (let c = s; c < e; c++) grid_data[row][c] = true;
  }

  stopPlayback();
  sfInstrument = null; sfLoadedProg = -1; setSfStatus('', '');
  buildKeys();
  if (audioCtx) loadSfInstrument(program);
  buildHeader();
  buildGrid();
  scrollToMiddleC();

  const msgs = [
    `✅「${fileName}」を読み込みました`,
    `${useNotes.length}音 ・ ${numBars}小節 ・ ${bpm}BPM ・ ${tsNum}/${tsDen}拍子 ・ ${gridResolution}分グリッド`,
  ];
  if (usePerc)         msgs.push('※ ドラム(GM Percussion)として読み込みました');
  if (droppedDrums)    msgs.push(`※ ドラム(ch10)の${droppedDrums}音は割愛（単一楽器モデルのため）`);
  if (folded)          msgs.push(`※ 音域外(C2〜B5外)の${folded}音をオクターブ移動して収めました`);
  if (clipped)         msgs.push(`※ ${clipped}音が${MAX_BARS}小節の範囲外でした`);
  if (truncated)       msgs.push(`※ ${MAX_BARS}小節を超える分は切り詰めました`);
  if (bestErr > 0.05)  msgs.push('※ グリッドに合わないタイミングはスナップしました');
  alert(msgs.join('\n'));
}

document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change', async function() {
  const file = this.files[0];
  if (!file) return;
  try {
    const buf = await file.arrayBuffer();
    applyImport(parseSMF(new Uint8Array(buf)), file.name);
  } catch (err) {
    alert('読み込みに失敗しました: ' + err.message);
  }
  this.value = '';   // allow re-selecting the same file
});

  const hasNotes = grid_data.some(row => row.some(v => v));

  document.getElementById('meta-modal').classList.add('open');

document.getElementById('btn-meta-save').addEventListener('click', () => {

// Close modal on backdrop click
document.getElementById('meta-modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// Enter key in modal fields
document.getElementById('meta-modal').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-meta-save').click();
  if (e.key === 'Escape') document.getElementById('meta-modal').classList.remove('open');
});

let currentIdea = null;

function generateIdea(direction) {
  let pool = PRESETS;
  if (direction === 'bright') pool = PRESETS.filter(p => p.brightness > 0);
  if (direction === 'emo')    pool = PRESETS.filter(p => p.energy < 0);
  if (direction === 'quiet')  pool = PRESETS.filter(p => p.bpm < 100);
  if (direction === 'other')  pool = PRESETS.filter(p => p !== currentIdea);
  if (pool.length === 0) pool = PRESETS;
  const candidates = pool.filter(p => p !== currentIdea);
  const source = candidates.length > 0 ? candidates : pool;
  currentIdea = source[Math.floor(Math.random() * source.length)];
}

function applyIdea() {
  const idea = currentIdea;
  stopPlayback();
  document.getElementById('bpm').value = idea.bpm;
  fillGridFromChords(idea.chords);
  renderAICard(idea);
}

function fillGridFromChords(chords) {
  initData();
  // 1コード = 1小節、numBars分をループで展開
  for (let bar = 0; bar < numBars; bar++) {
    const chord = chords[bar % chords.length];
    const notes = CHORD_NOTES[chord];
    if (!notes) continue;
    const startStep = bar * STEPS_PER_BAR;
    const durSteps  = STEPS_PER_BAR - 1;
    notes.forEach(midi => {
      if (midi < MIDI_LO || midi >= MIDI_HI) return;
      const r = (MIDI_HI - 1) - midi;
      for (let s = 0; s < durSteps; s++) {
        grid_data[r][startStep + s] = true;
      }
    });
  }
  buildGrid();
  scrollToMiddleC();
}

function renderAICard(idea) {
  const expanded = Array.from({ length: numBars }, (_, i) => idea.chords[i % idea.chords.length]);
  barChords = [...expanded];
  buildChordRow();   // this also refreshes the chord-progression display
  document.getElementById('ai-bpm').textContent    = 'BPM ' + idea.bpm;
  document.getElementById('ai-card').style.display = 'flex';
}
