<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI Maker</title>
<script src="https://unpkg.com/soundfont-player@0.12.0/dist/soundfont-player.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Toolbar ── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  background: #16213e;
  padding: 10px 16px;
  border-bottom: 2px solid #e94560;
  flex-shrink: 0;
}

#toolbar h1 { font-size: 18px; color: #e94560; white-space: nowrap; }

.ctrl { display: flex; align-items: center; gap: 6px; }
.ctrl label { font-size: 12px; color: #aaa; white-space: nowrap; }

input[type="number"] {
  width: 60px; padding: 4px 6px;
  background: #0f3460; border: 1px solid #e94560;
  color: white; border-radius: 4px; font-size: 14px; text-align: center;
}

select {
  padding: 4px 8px; background: #0f3460;
  border: 1px solid #555; color: white;
  border-radius: 4px; font-size: 13px; cursor: pointer;
}

button {
  padding: 7px 14px; border: none; border-radius: 5px;
  cursor: pointer; font-size: 13px; font-weight: bold;
  transition: opacity 0.15s;
}
button:hover { opacity: 0.8; }
button:active { opacity: 0.6; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

#btn-play   { background: #4caf50; color: #fff; }
#btn-stop   { background: #f44336; color: #fff; }
#btn-clear  { background: #607d8b; color: #fff; }
#btn-export { background: #e94560; color: #fff; }

/* ── Toolbar advanced toggle ── */
#toolbar-advanced { display: contents; }
#toolbar-advanced.hidden > * { display: none; }
#btn-advanced {
  padding: 5px 10px; background: transparent;
  border: 1px solid #2a3d60; border-radius: 4px;
  color: #556; font-size: 11px; cursor: pointer; font-weight: normal;
  white-space: nowrap;
}
#btn-advanced:hover { color: #99b; border-color: #446; opacity: 1; }

/* ── Volume slider ── */
#volume { width: 70px; accent-color: #e94560; cursor: pointer; vertical-align: middle; }
#volume-pct { font-size: 11px; color: #aaa; width: 34px; text-align: right; }

/* ── SF loading status ── */
#sf-status {
  font-size: 11px; color: #556; white-space: nowrap;
}
#sf-status.loading { color: #e9a020; }
#sf-status.ready   { color: #4caf50; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
#sf-status.loading { animation: pulse 1s infinite; }

/* ── Beat / Bar header ── */
#roll-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
}

#left-col {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}

#corner { width: 56px; height: 24px; background: #0d2040; flex-shrink: 0; }

#key-col {
  width: 56px;
  overflow: hidden;
  flex: 1;
}

#key-inner {
  /* height set by JS */
}

.key-row {
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 5px;
  font-size: 10px;
  border-bottom: 1px solid #162040;
  user-select: none;
  cursor: default;
}
.key-row.white { background: #1e3d6e; color: #bbb; }
.key-row.black { background: #0f1e3a; color: #777; }
.key-row.c-label { color: #e94560 !important; font-weight: bold; }

#right-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#header-scroll {
  overflow: hidden;
  flex-shrink: 0;
  height: 24px;
}

#header-row {
  display: flex;
  height: 24px;
  /* width set by JS */
}

.header-cell {
  width: 24px;
  height: 24px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #aaa;
  border-right: 1px solid #1a3050;
  background: #0d2040;
}
.header-cell.bar-label { color: #e94560; font-weight: bold; background: #161838; }
.header-cell.beat-label { color: #7090c0; }

#grid-scroll {
  flex: 1;
  overflow: auto;
  position: relative;
}

#grid {
  display: grid;
  /* columns & rows set by JS */
}

.cell {
  width: 24px;
  height: 20px;
  border-right: 1px solid #162040;
  border-bottom: 1px solid #162040;
  cursor: crosshair;
  transition: background 0.05s;
}
.cell.white { background: #0d2b55; }
.cell.black { background: #091a38; }
.cell.bar-start  { border-left: 2px solid #2a4a8a; }
.cell.beat-start { border-left: 1px solid #1e3560; }
.cell.active  { background: #4caf50 !important; }
.cell.playing { background: #ffeb3b !important; }
.cell:hover   { filter: brightness(1.4); }

/* ── Home Screen ── */
#home-screen {
  position: fixed; inset: 0;
  background: #1a1a2e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; gap: 24px;
}
#home-screen h1 { font-size: 22px; color: #e94560; letter-spacing: 0.04em; }
#btn-generate {
  padding: 22px 52px; background: #e94560; color: #fff;
  border: none; border-radius: 14px; font-size: 24px; font-weight: bold;
  cursor: pointer; box-shadow: 0 4px 32px rgba(233,69,96,0.45);
  transition: transform 0.12s, box-shadow 0.12s;
}
#btn-generate:hover  { transform: scale(1.04); box-shadow: 0 6px 40px rgba(233,69,96,0.6); opacity: 1; }
#btn-generate:active { transform: scale(0.97); opacity: 1; }
#home-tagline { font-size: 13px; color: #445; }

/* ── AI Card ── */
#ai-card {
  display: none; flex-shrink: 0;
  background: #13203a; border-bottom: 1px solid #1e3560;
  padding: 10px 16px; gap: 10px;
  flex-direction: column;
}
.ai-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
#ai-mood   { font-size: 16px; font-weight: bold; color: #e94560; }
#ai-chords { font-size: 14px; color: #7ab3ff; letter-spacing: 0.1em; }
#ai-bpm    { font-size: 12px; color: #556; }
#direction-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-dir {
  padding: 5px 14px; background: transparent;
  border: 1px solid #243558; border-radius: 20px;
  color: #778; font-size: 12px; cursor: pointer; font-weight: normal;
  transition: border-color 0.15s, color 0.15s;
}
.btn-dir:hover  { border-color: #e94560; color: #fff; opacity: 1; }
.btn-dir:active { opacity: 0.7; }

/* ── Meta Modal ── */
#meta-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65); z-index: 200;
  align-items: center; justify-content: center;
}
#meta-modal.open { display: flex; }
#meta-box {
  background: #16213e; border: 1px solid #e94560;
  border-radius: 12px; padding: 24px;
  width: 400px; max-width: 92vw;
  display: flex; flex-direction: column; gap: 14px;
}
#meta-box h2 { color: #e94560; font-size: 16px; }
.meta-field { display: flex; flex-direction: column; gap: 4px; }
.meta-field label { font-size: 12px; color: #aaa; }
.meta-field input {
  padding: 7px 10px; background: #0f3460;
  border: 1px solid #555; color: white;
  border-radius: 4px; font-size: 14px;
  transition: border-color 0.15s;
}
.meta-field input:focus { outline: none; border-color: #e94560; }
.meta-field input::placeholder { color: #445; }
.meta-hint { font-size: 11px; color: #445; }
.meta-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
#btn-meta-cancel { background: #2a3a55; color: #aaa; }
#btn-meta-save   { background: #e94560; color: #fff; }
.meta-field select {
  background: #1a2a40; border: 1px solid #2a4a70;
  color: white; border-radius: 4px; padding: 5px 8px; font-size: 13px;
}
.meta-field select:focus { outline: none; border-color: #e94560; }
</style>
</head>
<body>

<!-- Home Screen Overlay -->
<div id="home-screen">
  <h1>🎵 MIDI Maker</h1>
  <p id="home-tagline">AIが最初の一歩を作ります</p>
</div>

<div id="toolbar">
  <h1>🎵 MIDI Maker</h1>

  <div id="toolbar-advanced" class="hidden">
    <div class="ctrl">
      <label>BPM</label>
      <input type="number" id="bpm" value="120" min="30" max="300">
    </div>

    <div class="ctrl">
      <label>音符の長さ</label>
      <select id="note-len">
        <option value="1">16分音符</option>
        <option value="2">8分音符</option>
        <option value="4" selected>4分音符</option>
        <option value="8">2分音符</option>
        <option value="16">全音符</option>
      </select>
    </div>

    <div class="ctrl">
      <label>小節数</label>
      <select id="num-bars">
        <option value="2">2小節</option>
        <option value="4" selected>4小節</option>
        <option value="8">8小節</option>
        <option value="16">16小節</option>
      </select>
    </div>

    <div class="ctrl">
      <label>拍子</label>
      <select id="timesig-num">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="9">9</option>
        <option value="12">12</option>
      </select>
      <span style="color:#aaa;font-size:13px">/</span>
      <select id="timesig-den">
        <option value="2">2</option>
        <option value="4" selected>4</option>
        <option value="8">8</option>
      </select>
    </div>

    <div class="ctrl">
      <label>楽器</label>
      <!-- options built by JS -->
      <select id="instrument"></select>
    </div>

    <span id="sf-status"></span>
  </div>

  <button id="btn-advanced">詳細 ▼</button>
  <button id="btn-play">▶ 再生</button>
  <button id="btn-stop">■ 停止</button>
  <div class="ctrl">
    <label>🔊</label>
    <input type="range" id="volume" min="0" max="3" step="0.05" value="2">
    <span id="volume-pct">100%</span>
  </div>
  <button id="btn-clear">🗑 クリア</button>
  <button id="btn-export">💾 MIDIで保存</button>
</div>

<!-- AI Card -->
<div id="ai-card">
  <div class="ai-row">
    <span id="ai-mood"></span>
    <span id="ai-chords"></span>
    <span id="ai-bpm"></span>
  </div>
  <div id="direction-btns">
    <button class="btn-dir" data-dir="bright">もっと明るく</button>
    <button class="btn-dir" data-dir="emo">もっとエモく</button>
    <button class="btn-dir" data-dir="quiet">もっと静か</button>
    <button class="btn-dir" data-dir="other">別案</button>
  </div>
</div>

<div id="roll-wrap">
  <!-- Left column: corner + key labels -->
  <div id="left-col">
    <div id="corner"></div>
    <div id="key-col"><div id="key-inner"></div></div>
  </div>

  <!-- Right column: header + grid -->
  <div id="right-col">
    <div id="header-scroll"><div id="header-row"></div></div>
    <div id="grid-scroll">
      <div id="grid"></div>
    </div>
  </div>
</div>

<!-- Meta Info Modal -->
<div id="meta-modal">
  <div id="meta-box">
    <h2>💾 MIDIとして保存</h2>
    <p class="meta-hint">メタ情報は任意です。空欄のままでも保存できます。</p>
    <div class="meta-field">
      <label>曲名 (Track Name)</label>
      <input type="text" id="meta-title" placeholder="例: My Song" maxlength="128">
    </div>
    <div class="meta-field">
      <label>テキスト / 作者名 (Text)</label>
      <input type="text" id="meta-text" placeholder="例: Composed by ..." maxlength="128">
    </div>
    <div class="meta-field">
      <label>著作権 (Copyright)</label>
      <input type="text" id="meta-copyright" placeholder="例: © 2026 Your Name" maxlength="128">
    </div>
    <div class="meta-field">
      <label>調 (Key Signature)</label>
      <select id="meta-key">
        <option value="">（指定なし）</option>
        <optgroup label="長調 (Major)">
          <option value="-7,0">Cb Major (7♭)</option>
          <option value="-6,0">Gb Major (6♭)</option>
          <option value="-5,0">Db Major (5♭)</option>
          <option value="-4,0">Ab Major (4♭)</option>
          <option value="-3,0">Eb Major (3♭)</option>
          <option value="-2,0">Bb Major (2♭)</option>

          <option value="0,0">C Major (♮)</option>
          <option value="1,0">G Major (1♯)</option>
          <option value="2,0">D Major (2♯)</option>
          <option value="3,0">A Major (3♯)</option>
          <option value="4,0">E Major (4♯)</option>
          <option value="5,0">B Major (5♯)</option>
          <option value="6,0">F# Major (6♯)</option>
          <option value="7,0">C# Major (7♯)</option>
        </optgroup>
        <optgroup label="短調 (Minor)">
          <option value="-7,1">Ab minor (7♭)</option>
          <option value="-6,1">Eb minor (6♭)</option>
          <option value="-5,1">Bb minor (5♭)</option>
          <option value="-4,1">F minor (4♭)</option>
          <option value="-3,1">C minor (3♭)</option>
          <option value="-2,1">G minor (2♭)</option>
          <option value="-1,1">D minor (1♭)</option>
          <option value="0,1">A minor (♮)</option>
          <option value="1,1">E minor (1♯)</option>
          <option value="2,1">B minor (2♯)</option>
          <option value="3,1">F# minor (3♯)</option>
          <option value="4,1">C# minor (4♯)</option>
          <option value="5,1">G# minor (5♯)</option>
          <option value="6,1">D# minor (6♯)</option>
          <option value="7,1">A# minor (7♯)</option>
        </optgroup>
      </select>
    </div>
    <div class="meta-btns">
      <button id="btn-meta-cancel">キャンセル</button>
      <button id="btn-meta-save">保存する</button>
    </div>
  </div>
</div>

<script>
// ── GM Instrument Data ──────────────────────────────────
const GM_GROUPS = [
  { name: 'ピアノ', instruments: [

    'Electric Piano 1','Electric Piano 2','Harpsichord','Clavinet'] },

    'Blown Bottle','Shakuhachi','Whistle','Ocarina'] },

    'Lead: Square','Lead: Sawtooth','Lead: Calliope','Lead: Chiff',
    'Lead: Charang','Lead: Voice','Lead: Fifths','Lead: Bass+Lead'] },
  { name: 'シンセパッド', instruments: [
    'Pad: New Age','Pad: Warm','Pad: Polysynth','Pad: Choir',
    'Pad: Bowed','Pad: Metallic','Pad: Halo','Pad: Sweep'] },
  { name: 'シンセFX', instruments: [
    'FX: Rain','FX: Soundtrack','FX: Crystal','FX: Atmosphere',
    'FX: Brightness','FX: Goblins','FX: Echoes','FX: Sci-fi'] },
  { name: '民族楽器', instruments: [
    'Sitar','Banjo','Shamisen','Koto',
    'Kalimba','Bagpipe','Fiddle','Shanai'] },
  { name: 'パーカッション', instruments: [
    'Tinkle Bell','Agogo','Steel Drums','Woodblock',
    'Taiko Drum','Melodic Tom','Synth Drum','Reverse Cymbal'] },
  { name: '効果音', instruments: [
    'Guitar Fret Noise','Breath Noise','Seashore','Bird Tweet',
    'Telephone Ring','Helicopter','Applause','Gunshot'] },
];

// GM Percussion Map (MIDI note → drum sound name)
const GM_DRUM_NAMES = {
  35:'Acoustic Bass Drum', 36:'Bass Drum 1',    37:'Side Stick',
  38:'Acoustic Snare',     39:'Hand Clap',       40:'Electric Snare',
  41:'Low Floor Tom',      42:'Closed Hi-Hat',   43:'High Floor Tom',
  44:'Pedal Hi-Hat',       45:'Low Tom',         46:'Open Hi-Hat',
  47:'Low-Mid Tom',        48:'Hi-Mid Tom',      49:'Crash Cymbal 1',
  50:'High Tom',           51:'Ride Cymbal 1',   52:'Chinese Cymbal',
  53:'Ride Bell',          54:'Tambourine',      55:'Splash Cymbal',
  56:'Cowbell',            57:'Crash Cymbal 2',  58:'Vibraslap',
  59:'Ride Cymbal 2',      60:'Hi Bongo',        61:'Low Bongo',
  62:'Mute Hi Conga',      63:'Open Hi Conga',   64:'Low Conga',
  65:'High Timbale',       66:'Low Timbale',     67:'High Agogo',
  68:'Low Agogo',          69:'Cabasa',          70:'Maracas',
  71:'Short Whistle',      72:'Long Whistle',    73:'Short Guiro',
  74:'Long Guiro',         75:'Claves',          76:'Hi Wood Block',
  77:'Low Wood Block',     78:'Mute Cuica',      79:'Open Cuica',
  80:'Mute Triangle',      81:'Open Triangle',
};

// soundfont-player instrument names (index = GM program number)
const GM_SF_NAMES = [
  'acoustic_grand_piano','bright_acoustic_piano','electric_grand_piano','honkytonk_piano',
  'electric_piano_1','electric_piano_2','harpsichord','clavinet',
  'celesta','glockenspiel','music_box','vibraphone','marimba','xylophone','tubular_bells','dulcimer',
  'drawbar_organ','percussive_organ','rock_organ','church_organ','reed_organ','accordion','harmonica','tango_accordion',
  'acoustic_guitar_nylon','acoustic_guitar_steel','electric_guitar_jazz','electric_guitar_clean',
  'electric_guitar_muted','overdriven_guitar','distortion_guitar','guitar_harmonics',
  'acoustic_bass','electric_bass_finger','electric_bass_pick','fretless_bass',
  'slap_bass_1','slap_bass_2','synth_bass_1','synth_bass_2',
  'violin','viola','cello','contrabass','tremolo_strings','pizzicato_strings','orchestral_harp','timpani',
  'string_ensemble_1','string_ensemble_2','synthstrings_1','synthstrings_2',
  'choir_aahs','voice_oohs','synth_voice','orchestra_hit',
  'trumpet','trombone','tuba','muted_trumpet','french_horn','brass_section','synthbrass_1','synthbrass_2',
  'soprano_sax','alto_sax','tenor_sax','baritone_sax','oboe','english_horn','bassoon','clarinet',
  'piccolo','flute','recorder','pan_flute','blown_bottle','shakuhachi','whistle','ocarina',
  'lead_1_square','lead_2_sawtooth','lead_3_calliope','lead_4_chiff',
  'lead_5_charang','lead_6_voice','lead_7_fifths','lead_8_bass_lead',
  'pad_1_new_age','pad_2_warm','pad_3_polysynth','pad_4_choir',
  'pad_5_bowed','pad_6_metallic','pad_7_halo','pad_8_sweep',
  'fx_1_rain','fx_2_soundtrack','fx_3_crystal','fx_4_atmosphere',
  'fx_5_brightness','fx_6_goblins','fx_7_echoes','fx_8_sci_fi',
  'sitar','banjo','shamisen','koto','kalimba','bagpipe','fiddle','shanai',
  'tinkle_bell','agogo','steel_drums','woodblock','taiko_drum','melodic_tom','synth_drum','reverse_cymbal',
  'guitar_fret_noise','breath_noise','seashore','bird_tweet',
  'telephone_ring','helicopter','applause','gunshot',
];

// ── Constants ──────────────────────────────────────────
const MIDI_LO   = 36;   // C2
const MIDI_HI   = 84;   // C6 (exclusive)
const NUM_NOTES = MIDI_HI - MIDI_LO;  // 48
let STEPS_PER_BAR  = 16; // recalculated on timesig change
let STEPS_PER_BEAT = 4;  // recalculated on timesig change

function updateTimeSig() {
  const tsNum = +document.getElementById('timesig-num').value;
  const tsDen = +document.getElementById('timesig-den').value;
  STEPS_PER_BEAT = Math.round(16 / tsDen);
  STEPS_PER_BAR  = tsNum * STEPS_PER_BEAT;
}

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const IS_BLACK   = new Set([1,3,6,8,10]);

const midiToName  = m => NOTE_NAMES[m % 12] + (Math.floor(m / 12) - 1);
const isBlack     = m => IS_BLACK.has(m % 12);
const rowToMidi   = r => (MIDI_HI - 1) - r;
const midiNoteName = m => NOTE_NAMES[m % 12] + (Math.floor(m / 12) - 1);

// ── State ──────────────────────────────────────────────
let numBars  = 4;
let numSteps = numBars * STEPS_PER_BAR;
let grid_data = [];   // grid_data[row][col] boolean

function initData() {
  grid_data = Array.from({ length: NUM_NOTES }, () => new Array(numSteps).fill(false));
}
initData();

// ── Soundfont State ────────────────────────────────────
let audioCtx        = null;
let masterGainNode  = null;
let masterVolume    = 2.0;
let sfInstrument    = null;
let sfLoadedProg    = -1;
let sfLoading       = false;

function ensureMasterGain() {
  if (!masterGainNode) {
    masterGainNode = audioCtx.createGain();
    masterGainNode.gain.value = masterVolume;
    masterGainNode.connect(audioCtx.destination);
  }
  return masterGainNode;
}

function setSfStatus(state, text) {
  const el = document.getElementById('sf-status');
  el.className = state;
  el.textContent = text;
}

async function loadSfInstrument(program) {
  if (sfLoadedProg === program && sfInstrument) return;
  if (sfLoading) return;
  sfLoading = true;
  setSfStatus('loading', '音色を読み込み中...');
  try {
    const sfName = program === 128 ? 'standard_kit' : (GM_SF_NAMES[program] || 'acoustic_grand_piano');
    sfInstrument = await Soundfont.instrument(audioCtx, sfName, { soundfont: 'MusyngKite', destination: ensureMasterGain() });
    sfLoadedProg = program;
    const dispName = program === 128 ? 'GM Percussion Map' : (GM_SF_NAMES[program] || 'piano');
    setSfStatus('ready', '♪ ' + dispName.replace(/_/g, ' '));
  } catch(e) {
    console.warn('Soundfont load failed:', e);
    sfInstrument = null;
    setSfStatus('', '');
  }
  sfLoading = false;
}

function isPercussion() {
  return +document.getElementById('instrument').value === 128;
}

// ── Build Instrument Select ────────────────────────────
function buildInstrumentSelect() {
  const sel = document.getElementById('instrument');
  sel.innerHTML = '';
  let prog = 0;
  for (const group of GM_GROUPS) {
    const og = document.createElement('optgroup');
    og.label = group.name;
    for (const name of group.instruments) {
      const opt = document.createElement('option');
      opt.value = prog;
      opt.textContent = prog + ': ' + name;
      og.appendChild(opt);
      prog++;
    }
    sel.appendChild(og);
  }
  // GM Percussion Map (channel 10)
  const ogDrum = document.createElement('optgroup');
  ogDrum.label = 'ドラム';
  const optDrum = document.createElement('option');
  optDrum.value = 128;
  optDrum.textContent = '128: GM Percussion Map';
  ogDrum.appendChild(optDrum);
  sel.appendChild(ogDrum);
}

// ── Render ─────────────────────────────────────────────
function buildUI() {
  buildInstrumentSelect();
  buildKeys();
  buildHeader();
  buildGrid();
  scrollToMiddleC();
}

function buildKeys() {
  const inner = document.getElementById('key-inner');
  inner.innerHTML = '';
  inner.style.height = NUM_NOTES * 20 + 'px';
  const perc = isPercussion();
  for (let r = 0; r < NUM_NOTES; r++) {
    const midi = rowToMidi(r);
    const div  = document.createElement('div');
    if (perc) {
      div.className = 'key-row white';
      const dname = GM_DRUM_NAMES[midi];
      div.textContent = dname || '';
      div.style.fontSize = '9px';
      div.style.color = dname ? '#e0e0e0' : '#444';
      div.style.textAlign = 'left';
      div.style.paddingLeft = '4px';
      div.style.overflow = 'hidden';
      div.style.whiteSpace = 'nowrap';
    } else {
      div.className = 'key-row ' + (isBlack(midi) ? 'black' : 'white');
      if (midi % 12 === 0) {
        div.classList.add('c-label');
        div.textContent = midiToName(midi);
      } else if (!isBlack(midi)) {
        div.textContent = NOTE_NAMES[midi % 12];
      } else {
        div.textContent = '♯';
      }
    }
    inner.appendChild(div);
  }
}

function buildHeader() {
  const row = document.getElementById('header-row');
  row.innerHTML = '';
  row.style.width = numSteps * 24 + 'px';
  for (let c = 0; c < numSteps; c++) {
    const div = document.createElement('div');
    div.className = 'header-cell';
    if (c % STEPS_PER_BAR === 0) {
      div.classList.add('bar-label');
      div.textContent = 'bar ' + (c / STEPS_PER_BAR + 1);
    } else if (c % STEPS_PER_BEAT === 0) {
      div.classList.add('beat-label');
      div.textContent = (c % STEPS_PER_BAR) / STEPS_PER_BEAT + 1;
    }
    row.appendChild(div);
  }
}

function buildGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  g.style.gridTemplateColumns = `repeat(${numSteps}, 24px)`;
  g.style.gridTemplateRows    = `repeat(${NUM_NOTES}, 20px)`;
  g.style.width  = numSteps * 24 + 'px';
  g.style.height = NUM_NOTES * 20 + 'px';

  for (let r = 0; r < NUM_NOTES; r++) {
    const midi = rowToMidi(r);
    for (let c = 0; c < numSteps; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + (isBlack(midi) ? 'black' : 'white');
      if (c % STEPS_PER_BAR === 0)        cell.classList.add('bar-start');
      else if (c % STEPS_PER_BEAT === 0)  cell.classList.add('beat-start');
      if (grid_data[r][c])           cell.classList.add('active');
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('mousedown', onDown);
      cell.addEventListener('mouseenter', onEnter);
      g.appendChild(cell);
    }
  }
}

function scrollToMiddleC() {
  const c4row = (MIDI_HI - 1) - 60;
  const scrollTarget = c4row * 20 - 100;
  document.getElementById('grid-scroll').scrollTop = Math.max(0, scrollTarget);
}

// ── Sync key-col scroll with grid-scroll ───────────────
document.getElementById('grid-scroll').addEventListener('scroll', function() {
  document.getElementById('key-col').scrollTop = this.scrollTop;
  document.getElementById('header-scroll').scrollLeft = this.scrollLeft;
});

// ── Mouse interaction ──────────────────────────────────
let mouseDown = false;
let dragMode  = null; // 'add' | 'remove'

document.addEventListener('mousedown', () => mouseDown = true);
document.addEventListener('mouseup',   () => { mouseDown = false; dragMode = null; });

function onDown(e) {
  e.preventDefault();
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;
  if (grid_data[r][c]) {
    dragMode = 'remove';
    removeNote(r, c);
  } else {
    dragMode = 'add';
    addNote(r, c);
  }
}

function onEnter(e) {
  if (!mouseDown || !dragMode) return;
  const r = +e.currentTarget.dataset.r;
  const c = +e.currentTarget.dataset.c;
  if (dragMode === 'add')    addNote(r, c);
  if (dragMode === 'remove') removeNote(r, c);
}

function addNote(r, c) {
  const len = +document.getElementById('note-len').value;
  for (let i = 0; i < len && c + i < numSteps; i++) {
    grid_data[r][c + i] = true;
    cellEl(r, c + i)?.classList.add('active');
  }
}

function removeNote(r, c) {
  grid_data[r][c] = false;
  cellEl(r, c)?.classList.remove('active');
}

function cellEl(r, c) {
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

// ── Bar count change ───────────────────────────────────
document.getElementById('num-bars').addEventListener('change', function() {
  const newBars  = +this.value;
  const newSteps = newBars * STEPS_PER_BAR;
  for (let r = 0; r < NUM_NOTES; r++) {
    if (newSteps > numSteps) {
      for (let c = numSteps; c < newSteps; c++) grid_data[r].push(false);
    } else {
      grid_data[r].length = newSteps;
    }
  }
  numBars  = newBars;
  numSteps = newSteps;
  buildHeader();
  buildGrid();
});

// ── Time signature change ──────────────────────────────
function onTimeSigChange() {
  updateTimeSig();
  const newSteps = numBars * STEPS_PER_BAR;
  for (let r = 0; r < NUM_NOTES; r++) {
    if (newSteps > numSteps) {
      for (let c = numSteps; c < newSteps; c++) grid_data[r].push(false);
    } else {
      grid_data[r].length = newSteps;
    }
  }
  numSteps = newSteps;
  buildHeader();
  buildGrid();
}
document.getElementById('timesig-num').addEventListener('change', onTimeSigChange);
document.getElementById('timesig-den').addEventListener('change', onTimeSigChange);

// ── Volume slider ─────────────────────────────────────
document.getElementById('volume').addEventListener('input', function() {
  masterVolume = parseFloat(this.value);
  if (masterGainNode) masterGainNode.gain.value = masterVolume;
  document.getElementById('volume-pct').textContent = Math.round(masterVolume * 50) + '%';
});

// ── Instrument change → reload soundfont ───────────────
document.getElementById('instrument').addEventListener('change', function() {
  sfInstrument = null;
  sfLoadedProg = -1;
  setSfStatus('', '');
  buildKeys();
  if (audioCtx) {
    loadSfInstrument(+this.value);
  }
});

// ── Playback ───────────────────────────────────────────
let playing    = false;
let playTimer  = null;
let curStep    = 0;
let nextTime   = 0;
let lastHighCol = -1;

function stepDuration() {
  return 60 / (+document.getElementById('bpm').value) / 4;
}

function midiToFreq(m) { return 440 * 2 ** ((m - 69) / 12); }

function scheduleNote(midi, when, dur) {
  if (sfInstrument) {
    const d = isPercussion() ? Math.min(dur, 0.5) : dur * 0.85;
    sfInstrument.play(midiNoteName(midi), when, { duration: d, gain: 1.0 });
  } else {
    // Fallback oscillator
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = 'triangle';
    osc.frequency.value = midiToFreq(midi);
    gain.gain.setValueAtTime(0.25, when);
    gain.gain.exponentialRampToValueAtTime(0.0001, when + dur * 0.85);
    osc.start(when);
    osc.stop(when + dur);
  }
}

function scheduleLoop() {
  const dur = stepDuration();
  while (nextTime < audioCtx.currentTime + 0.15) {
    const step = curStep;
    const delay = (nextTime - audioCtx.currentTime) * 1000;
    setTimeout(() => highlightCol(step), Math.max(0, delay));

    for (let r = 0; r < NUM_NOTES; r++) {
      if (grid_data[r][step]) {
        if (isPercussion()) {
          // Each cell = one drum hit
          scheduleNote(rowToMidi(r), nextTime, dur * 0.9);
        } else {
          // Only trigger at the start of a run
          const isStart = step === 0 || !grid_data[r][step - 1];
          if (isStart) {
            let len = 1;
            while (step + len < numSteps && grid_data[r][step + len]) len++;
            scheduleNote(rowToMidi(r), nextTime, dur * len * 0.9);
          }
        }
      }
    }
    nextTime += dur;
    curStep = (curStep + 1) % numSteps;
  }
}

function highlightCol(col) {
  if (lastHighCol >= 0) {
    for (let r = 0; r < NUM_NOTES; r++) {
      cellEl(r, lastHighCol)?.classList.remove('playing');
    }
  }
  for (let r = 0; r < NUM_NOTES; r++) {
    cellEl(r, col)?.classList.add('playing');
  }
  lastHighCol = col;
}

function clearPlayHighlight() {
  if (lastHighCol >= 0) {
    for (let r = 0; r < NUM_NOTES; r++) {
      cellEl(r, lastHighCol)?.classList.remove('playing');
    }
    lastHighCol = -1;
  }
}

document.getElementById('btn-play').addEventListener('click', async () => {
  if (playing) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  const program = +document.getElementById('instrument').value;
  if (!sfInstrument && !sfLoading) {
    const btn = document.getElementById('btn-play');
    btn.textContent = '読み込み中...';
    btn.disabled = true;
    await loadSfInstrument(program);
    btn.textContent = '▶ 再生';
    btn.disabled = false;
  }

  playing  = true;
  curStep  = 0;
  nextTime = audioCtx.currentTime + 0.05;
  scheduleLoop();
  playTimer = setInterval(scheduleLoop, 50);
});

function stopPlayback() {
  playing = false;
  clearInterval(playTimer);
  clearPlayHighlight();
  if (sfInstrument) sfInstrument.stop();
}

document.getElementById('btn-stop').addEventListener('click', stopPlayback);

document.getElementById('btn-clear').addEventListener('click', () => {
  stopPlayback();
  initData();
  buildGrid();
});

// ── MIDI Export ────────────────────────────────────────
function varLen(v) {
  const b = [v & 0x7F]; v >>= 7;
  while (v) { b.push((v & 0x7F) | 0x80); v >>= 7; }
  return b.reverse();
}
const u32 = v => [(v>>24)&0xFF,(v>>16)&0xFF,(v>>8)&0xFF,v&0xFF];
const u16 = v => [(v>>8)&0xFF,v&0xFF];

function writeMetaText(type, text) {
  if (!text || !text.trim()) return [];
  const bytes = Array.from(new TextEncoder().encode(text.trim()));
  return [0x00, 0xFF, type, ...varLen(bytes.length), ...bytes];
}

function getInstrumentName(program) {
  let idx = 0;
  for (const group of GM_GROUPS) {
    for (const name of group.instruments) {
      if (idx === program) return name;
      idx++;
    }
  }
  return null;
}

function doExport(title, textNote, copyright, keySig) {
  const bpm        = +document.getElementById('bpm').value;
  const instrument = +document.getElementById('instrument').value;
  const perc       = instrument === 128;
  const ch         = perc ? 9 : 0;
  const tsNum      = +document.getElementById('timesig-num').value;
  const tsDen      = +document.getElementById('timesig-den').value;
  const TPB        = 480;
  const TPS        = TPB / 4;

  const evs = [];
  for (let r = 0; r < NUM_NOTES; r++) {
    const midi = rowToMidi(r);
    if (perc) {
      // Each cell is a separate drum hit
      for (let c = 0; c < numSteps; c++) {
        if (grid_data[r][c]) {
          evs.push({ tick: c * TPS,       type: 0x90 | ch, note: midi, vel: 100 });
          evs.push({ tick: c * TPS + TPS, type: 0x80 | ch, note: midi, vel: 0   });
        }
      }
    } else {
      let start = -1;
      for (let c = 0; c <= numSteps; c++) {
        const on = c < numSteps && grid_data[r][c];
        if (on  && start < 0) start = c;
        if (!on && start >= 0) {
          evs.push({ tick: start * TPS, type: 0x90 | ch, note: midi, vel: 100 });
          evs.push({ tick: c     * TPS, type: 0x80 | ch, note: midi, vel: 0   });
          start = -1;
        }
      }
    }
  }

  if (!evs.length) { alert('ノートが入力されていません'); return; }

  evs.sort((a, b) => a.tick - b.tick || (a.type === 0x80 ? -1 : 1));

  const track = [];
  const tempo = Math.round(60_000_000 / bpm);

  // Meta events (all at tick 0)
  track.push(0x00, 0xFF, 0x51, 0x03, (tempo>>16)&0xFF, (tempo>>8)&0xFF, tempo&0xFF);
  track.push(0x00, 0xFF, 0x58, 0x04, tsNum, Math.log2(tsDen), 24, 8);
  if (keySig) {
    const [k, s] = keySig.split(',').map(Number);
    track.push(0x00, 0xFF, 0x59, 0x02, k & 0xFF, s);
  }
  track.push(...writeMetaText(0x03, title));
  track.push(...writeMetaText(0x01, textNote));
  track.push(...writeMetaText(0x02, copyright));
  const instrName = perc ? 'GM Percussion Map' : getInstrumentName(instrument);
  if (instrName) track.push(...writeMetaText(0x04, instrName));

  // Program change (skip for percussion channel)
  if (!perc) track.push(0x00, 0xC0, instrument);

  // Note events
  let cur = 0;
  for (const ev of evs) {
    track.push(...varLen(ev.tick - cur), ev.type, ev.note, ev.vel);
    cur = ev.tick;
  }
  track.push(0x00, 0xFF, 0x2F, 0x00);

  const bytes = new Uint8Array([
    0x4D,0x54,0x68,0x64, ...u32(6), ...u16(0), ...u16(1), ...u16(TPB),
    0x4D,0x54,0x72,0x6B, ...u32(track.length), ...track,
  ]);

  const safeTitle = (title && title.trim()) ? title.trim().replace(/[\\/:*?"<>|]/g, '_') : 'composition';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([bytes], { type: 'audio/midi' }));
  a.download = safeTitle + '.mid';
  a.click();
}

// Export button → open modal
document.getElementById('btn-export').addEventListener('click', () => {
  const hasNotes = grid_data.some(row => row.some(v => v));
  if (!hasNotes) { alert('ノートが入力されていません'); return; }
  document.getElementById('meta-modal').classList.add('open');
  document.getElementById('meta-title').focus();
});

// Modal: cancel
document.getElementById('btn-meta-cancel').addEventListener('click', () => {
  document.getElementById('meta-modal').classList.remove('open');
});

// Modal: save
document.getElementById('btn-meta-save').addEventListener('click', () => {
  const title     = document.getElementById('meta-title').value;
  const textNote  = document.getElementById('meta-text').value;
  const copyright = document.getElementById('meta-copyright').value;
  const keySig    = document.getElementById('meta-key').value;
  document.getElementById('meta-modal').classList.remove('open');

});

document.getElementById('meta-modal').addEventListener('click', function(e) {

});

// Enter key in modal fields
document.getElementById('meta-modal').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-meta-save').click();
  if (e.key === 'Escape') document.getElementById('meta-modal').classList.remove('open');
});

// ── AI Generation ──────────────────────────────────────
const CHORD_NOTES = {
  'C':  [60,64,67], 'Cm': [60,63,67],
  'D':  [62,66,69], 'Dm': [62,65,69],
  'E':  [64,68,71], 'Em': [64,67,71],
  'F':  [65,69,72], 'Fm': [65,68,72],
  'G':  [67,71,74], 'Gm': [67,70,74],
  'A':  [57,61,64], 'Am': [57,60,64],
  'Bb': [58,62,65],
  'B':  [59,63,66], 'Bm': [59,62,66],
  'F#m':[66,69,73],
};

const PRESETS = [
  { chords:['C','Am','F','G'],   bpm:120, mood:'夜のドライブ',   brightness:0,  energy:1  },
  { chords:['G','Em','C','D'],   bpm:112, mood:'秋の午後',       brightness:0,  energy:0  },
  { chords:['Am','G','F','E'],   bpm: 98, mood:'どこか遠い場所', brightness:-1, energy:0  },
  { chords:['C','G','Am','F'],   bpm:130, mood:'晴れた朝',       brightness:2,  energy:2  },
  { chords:['G','D','Em','C'],   bpm:124, mood:'夏の海',         brightness:2,  energy:2  },
  { chords:['C','F','G','Am'],   bpm:118, mood:'はじまりの日',   brightness:1,  energy:1  },
  { chords:['D','G','A','Bm'],   bpm:132, mood:'旅のはじまり',   brightness:1,  energy:2  },
  { chords:['Am','F','C','G'],   bpm: 88, mood:'雨の窓',         brightness:-2, energy:-1 },
  { chords:['Em','Am','D','G'],  bpm: 92, mood:'夕暮れの帰り道', brightness:-1, energy:-1 },
  { chords:['Dm','Am','Bb','F'], bpm: 76, mood:'別れの朝',       brightness:-2, energy:-2 },
  { chords:['Am','C','G','F'],   bpm: 95, mood:'ひとりの夜',     brightness:-1, energy:-1 },
  { chords:['C','Am','F','G'],   bpm: 72, mood:'深夜のカフェ',   brightness:0,  energy:-2 },
  { chords:['Am','Dm','G','C'],  bpm: 68, mood:'眠れない夜',     brightness:-1, energy:-2 },
  { chords:['Em','C','G','D'],   bpm: 80, mood:'静かな森',       brightness:1,  energy:-2 },
  { chords:['G','D','Em','C'],   bpm:138, mood:'スタートライン', brightness:2,  energy:3  },
  { chords:['D','A','Bm','G'],   bpm:134, mood:'新しい挑戦',     brightness:1,  energy:2  },
  { chords:['C','G','F','Am'],   bpm:105, mood:'日曜の午後',     brightness:1,  energy:-1 },
  { chords:['F','C','Dm','Bb'],  bpm: 75, mood:'夜明け前',       brightness:-1, energy:-2 },
  { chords:['G','C','Em','D'],   bpm:116, mood:'懐かしい道',     brightness:0,  energy:0  },
  { chords:['Am','F#m','C','G'], bpm:108, mood:'夢のかけら',     brightness:-1, energy:1  },
];

let currentIdea = null;

function generateIdea(direction) {
  let pool = PRESETS;
  if (direction === 'bright') pool = PRESETS.filter(p => p.brightness > 0);
  if (direction === 'emo')    pool = PRESETS.filter(p => p.energy < 0);
  if (direction === 'quiet')  pool = PRESETS.filter(p => p.bpm < 100);
  if (direction === 'other')  pool = PRESETS.filter(p => p !== currentIdea);
  if (pool.length === 0) pool = PRESETS;
  const candidates = pool.filter(p => p !== currentIdea);
  const source = candidates.length > 0 ? candidates : pool;
  currentIdea = source[Math.floor(Math.random() * source.length)];
}

function applyIdea() {
  const idea = currentIdea;
  stopPlayback();
  document.getElementById('bpm').value = idea.bpm;
  if (numBars !== 4) {
    document.getElementById('num-bars').value = '4';
    numBars  = 4;
    numSteps = numBars * STEPS_PER_BAR;
    buildHeader();
  }
  fillGridFromChords(idea.chords);
  renderAICard(idea);
}

function fillGridFromChords(chords) {
  initData();
  const barsPerChord = Math.floor(numBars / chords.length);
  chords.forEach((chord, i) => {
    const notes = CHORD_NOTES[chord];
    if (!notes) return;
    const startStep = i * barsPerChord * STEPS_PER_BAR;
    const durSteps  = barsPerChord * STEPS_PER_BAR - 1;
    notes.forEach(midi => {
      if (midi < MIDI_LO || midi >= MIDI_HI) return;
      const r = (MIDI_HI - 1) - midi;
      for (let s = 0; s < durSteps; s++) {
        const c = startStep + s;
        if (c < numSteps) grid_data[r][c] = true;
      }
    });
  });
  buildGrid();
  scrollToMiddleC();
}

function renderAICard(idea) {
  document.getElementById('ai-mood').textContent   = idea.mood;
  document.getElementById('ai-chords').textContent = idea.chords.join(' → ');
  document.getElementById('ai-bpm').textContent    = 'BPM ' + idea.bpm;
  document.getElementById('ai-card').style.display = 'flex';
}

document.querySelectorAll('.btn-dir').forEach(btn => {
  btn.addEventListener('click', () => {
    generateIdea(btn.dataset.dir);
    applyIdea();
  });
});

// ── Toolbar Advanced Toggle ────────────────────────────
